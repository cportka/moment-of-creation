<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Lissajous</title>
    <style>
/*
 * Lissajous styles — a self-contained, forkable unit, same shape as the intro's
 * intro.css. One full-screen canvas with an opaque background so it paints on the first
 * frame (the same trick the intro uses with its opaque #osp-creation layer). Namespaced
 * #osp-liss; everything else (shape, colour, motion) is driven from the inline boot
 * script in overlay.html via window.__ospDials.
 */
#osp-liss {
  position: fixed;
  inset: 0;
  z-index: 2000;
  display: block;
  width: 100vw;
  height: 100vh;
  background: #05060a;
  pointer-events: none;
}

    </style>
  </head>
  <body style="margin: 0; background: #05060a">
    <!-- Lissajous — self-contained export from the moment-of-creation engine. The
         inline script below paints on the first frame; there is no external app, so
         __ospBoot is a no-op. Zero external dependencies. -->
    <script>
      window.__ospBoot = function () {};
    </script>
<!-- Lissajous — a second animation that shares the engine and nothing else. Like the
     intro it is a self-contained overlay: full-screen canvas + an inline boot script
     that paints on the very first frame (opaque wipe + frame 0, before any bundle) and
     exposes the window.__osp* contract. No black hole here — just a glowing curve whose
     shape, colour and motion are live dials. -->
<canvas id="osp-liss" aria-hidden="true"></canvas>
<script>
  (function () {
    try {
      var cv = document.getElementById('osp-liss');
      if (!cv) return;
      var ctx = cv.getContext('2d');
      if (!ctx) return;

      // ===== Dials — the one place to tune this animation. Mirrored by LISSAJOUS_DIALS
      // in lissajous.ts (an engine test keeps the two locked, like the intro's). =====
      window.__ospDials = {
        freqX: 3, // horizontal frequency (lobes across)
        freqY: 2, // vertical frequency (lobes down)
        phase: 90, // phase offset between x and y (degrees)
        spin: 6, // how fast the phase drifts (deg/s) — keeps the figure alive
        speed: 1, // overall time multiplier
        trail: 90, // motion-trail persistence (0 = none, 100 = never fades)
        points: 900, // samples along the curve (smoothness)
        width: 2.5, // stroke width (px)
        hue: 190, // base colour (degrees); drifts over time
      };

      var raf = 0, t0 = 0, reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function fit() {
        var dpr = Math.min(2, window.devicePixelRatio || 1);
        cv.width = Math.round(innerWidth * dpr);
        cv.height = Math.round(innerHeight * dpr);
        cv.style.width = innerWidth + 'px';
        cv.style.height = innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels, crisp on retina
      }
      addEventListener('resize', fit);

      function clear() {
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#05060a';
        ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.restore();
      }

      // Draw the curve at story-time t (seconds). Pure: no scheduling, so it doubles as
      // the synchronous first-paint frame.
      function draw(t) {
        var D = window.__ospDials;
        var W = innerWidth, H = innerHeight, cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.4;
        // Motion trail: a translucent wash (not a hard clear) so prior frames fade out.
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(5,6,10,' + (1 - Math.min(0.999, (D.trail || 0) / 100)) + ')';
        ctx.fillRect(0, 0, W, H);
        var ph = (D.phase * Math.PI) / 180 + (t * D.spin * Math.PI) / 180;
        var hue = (D.hue + t * 24) % 360;
        ctx.globalCompositeOperation = 'lighter';
        ctx.lineWidth = D.width;
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'hsl(' + hue.toFixed(1) + ',95%,62%)';
        ctx.shadowBlur = 18;
        ctx.shadowColor = 'hsl(' + hue.toFixed(1) + ',95%,60%)';
        ctx.beginPath();
        var N = Math.max(2, D.points | 0);
        for (var i = 0; i <= N; i++) {
          var u = (i / N) * 6.2831853;
          var x = cx + R * Math.sin(D.freqX * u + ph);
          var y = cy + R * Math.sin(D.freqY * u);
          if (i) ctx.lineTo(x, y); else ctx.moveTo(x, y);
        }
        ctx.stroke();
      }

      function frame(now) {
        if (!cv.isConnected) { raf = 0; return; } // unmounted (the lab switched away): stop
        if (!t0) t0 = now;
        draw(((now - t0) / 1000) * (window.__ospDials.speed || 0));
        if (!reduce) raf = requestAnimationFrame(frame); else raf = 0;
      }

      // (Re)play from the top — the generic engine entry the lab/registry call.
      window.__ospPlay = function () {
        t0 = 0;
        clear();
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(frame);
      };

      // Honour the contract: kick the host's app loader under the animation (a no-op in
      // the lab / standalone export, where there is nothing to boot).
      if (window.__ospBoot && !window.__ospBooted) { window.__ospBooted = true; window.__ospBoot(); }

      // First paint — before any bundle parses: size, wipe opaque, draw frame 0, then run.
      fit();
      clear();
      t0 = 0;
      draw(0);
      raf = requestAnimationFrame(frame);
    } catch (e) {
      /* the animation is non-essential — never let it break the page */
    }
  })();
</script>

  </body>
</html>
