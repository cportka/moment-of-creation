<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Moment of creation</title>
    <style>
/*
 * The intro stylesheet — the moment of creation, the binary-merger splash, and the
 * Replay "melt inward", split out of the app stylesheet so the whole intro is one
 * self-contained, forkable unit (see src/intro/README.md). Loaded as its own
 * <link> by index.html (alongside the app styles) and by intro-lab.html (on its
 * own). All selectors are namespaced #osp-creation / #osp-splash / .osp-cr /
 * .osp-lines / .osp-melting and drive the inline boot script in overlay.html via
 * the --osp-* custom properties (the dials).
 */
/* Replay's "melt inward" (src/intro/melt.ts): the live engine canvas collapses
   toward the One Still Point at the centre of the screen — scaling + spinning down
   to a point, blurring and fading to black — over 2s (== INTRO_TIMING.meltMs),
   before the intro replays from the black screen. forwards holds it melted-away
   (black) through the black-hold beat; melt.restore() clears it under the splash. */
canvas.osp-melting {
  animation: osp-melt 2s cubic-bezier(0.6, 0, 0.9, 0.35) forwards;
  transform-origin: 50% 50%;
  will-change: transform, opacity, filter;
}
@keyframes osp-melt {
  0% {
    transform: scale(1) rotate(0deg);
    filter: blur(0);
    opacity: 1;
  }
  60% {
    filter: blur(5px);
    opacity: 0.92;
  }
  100% {
    transform: scale(0.012) rotate(150deg);
    filter: blur(26px);
    opacity: 0;
  }
}

/* --- The "moment of creation" (intro beat 0, ~0.0–0.18s). A separate, cheap
   mechanism from the splash: pure CSS (no canvas / JS loop), GPU-composited
   transforms + gradients only (no blur), so it's instant and identical on every
   device. A full-screen burst of light, neon beams and reverberating rings. The
   inline script adds --go on the first painted frame, then --hide as the splash
   takes over (overlapping from ~0.1s). Kept smooth, not strobing. --- */
#osp-creation {
  position: fixed;
  inset: 0;
  z-index: 2100; /* above the splash (2000) until it fades out */
  background: #05060a; /* same as the splash, so the cross-fade reveals it seamlessly */
  overflow: hidden;
  pointer-events: none;
  opacity: 1;
  transition: opacity var(--osp-cr-fade, 0.12s) ease; /* (e) creation→splash crossfade speed */
}
#osp-creation.osp-creation--hide {
  opacity: 0;
}
.osp-cr {
  position: absolute;
  left: 50%;
  top: 50%;
  opacity: 0;
  will-change: transform, opacity;
  animation-fill-mode: forwards;
}
/* Hold the ENTIRE burst paused until the black hold + test pattern have played and the
   inline script adds --go. This rule needs **higher specificity** than the per-element
   `animation:` shorthands below — the shorthand resets `animation-play-state` to its
   initial `running`, which is the bug that made the burst fire on page-load (before the
   black). `#osp-creation:not(--go) .osp-cr` (id + 2 classes) beats `.osp-cr-core` (1
   class), so the burst genuinely waits; once --go lands, :not stops matching and each
   element's own `running` resumes it from 0%. */
#osp-creation:not(.osp-creation--go) .osp-cr {
  animation-play-state: paused;
}
/* The white-hot seed at the centre. */
.osp-cr-core {
  width: var(--osp-cr-core, 7vmax);
  height: var(--osp-cr-core, 7vmax);
  margin: calc(var(--osp-cr-core, 7vmax) / -2);
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #fff6e0 38%, transparent 72%);
  animation: osp-cr-core calc(0.18s * var(--osp-cr-scale, 1)) ease-out;
}
@keyframes osp-cr-core {
  0% { transform: scale(0); opacity: 0; }
  28% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.18); opacity: 0; }
}
/* Full-screen flashes of light. */
.osp-cr-flash {
  width: var(--osp-cr-flash, 30vmax);
  height: var(--osp-cr-flash, 30vmax);
  margin: calc(var(--osp-cr-flash, 30vmax) / -2);
  border-radius: 50%;
  background: radial-gradient(circle, var(--c, #fff) 0%, rgba(255, 255, 255, 0.28) 30%, transparent 62%);
  animation: osp-cr-flash calc(0.2s * var(--osp-cr-scale, 1)) ease-out var(--d, 0s);
}
@keyframes osp-cr-flash {
  0% { transform: scale(0.04); opacity: 0; }
  22% { opacity: 0.95; }
  100% { transform: scale(8); opacity: 0; }
}
/* Neon beams sweeping out to the edges. */
.osp-cr-ray {
  width: var(--osp-cr-ray-len, 150vmax);
  height: var(--osp-cr-ray-w, 0.7vmax);
  margin: calc(var(--osp-cr-ray-w, 0.7vmax) / -2) 0 0 0;
  transform-origin: 0 50%;
  border-radius: 1vmax;
  background: linear-gradient(90deg, #fff 0%, var(--c, #fff) 16%, transparent 72%);
  animation: osp-cr-ray calc(0.22s * var(--osp-cr-scale, 1)) cubic-bezier(0.1, 0.7, 0.3, 1) var(--d, 0s);
}
@keyframes osp-cr-ray {
  0% { transform: rotate(var(--a, 0deg)) scaleX(0.02); opacity: 0; }
  25% { opacity: 0.9; }
  100% { transform: rotate(var(--a, 0deg)) scaleX(1); opacity: 0; }
}
/* Reverberating shock rings. */
.osp-cr-ring {
  width: 12vmax;
  height: 12vmax;
  margin: -6vmax;
  border-radius: 50%;
  border: var(--osp-cr-ring-w, 0.5vmax) solid var(--c, #fff);
  animation: osp-cr-ring calc(0.28s * var(--osp-cr-scale, 1)) ease-out var(--d, 0s);
}
@keyframes osp-cr-ring {
  0% { transform: scale(0.1); opacity: 0; }
  18% { opacity: 0.85; }
  100% { transform: scale(var(--osp-cr-ring-x, 13)); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .osp-cr {
    animation-duration: 0.01s;
  }
}
/* Beat B — the single-frame test pattern: full-screen horizontal bands 40px tall,
   alternating white/black. The inline script shows it for exactly one painted frame
   (no transition — a literal 1-frame flash), above the still-paused creation burst.
   A deliberate "sync frame" / academy-leader strobe between the black and the birth. */
.osp-lines {
  position: absolute;
  inset: 0;
  z-index: 10; /* above the burst children within #osp-creation */
  background: repeating-linear-gradient(180deg, #fff 0 var(--osp-lines-band, 40px), #000 var(--osp-lines-band, 40px) calc(var(--osp-lines-band, 40px) * 2));
  opacity: 0;
  pointer-events: none;
}
.osp-lines.osp-lines--on {
  opacity: 1;
}

/* --- Load splash (Phase 15): an instant, JS-free black-and-white "formation"
   that paints before the WebGPU shader compiles, then crossfades to the live
   scene. A cluster of bodies spirals inward (accretion) and merges into the
   forming event horizon + photon ring. main.ts adds .osp-splash--hide once the
   first real frame is on screen, and removes the node after the fade. --- */
#osp-splash {
  position: fixed;
  inset: 0;
  z-index: 2000; /* above the canvas and the (collapsed) panel during load */
  background: #05060a;
  display: grid;
  place-items: center;
  opacity: 1;
  /* No *show* transition: a replay must cover the live scene instantly (no old
     frame bleeding through). Only the dismiss fades — see .osp-splash--hide. */
}
#osp-splash.osp-splash--hide {
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--osp-splash-fade, 0.45s) ease; /* (f) splash→engine crossfade speed */
}
/* Hold the merger choreography paused until --go (added on the splash's first canvas
   frame). This must out-specify the per-element `animation:` shorthands below — the
   shorthand resets animation-play-state to its initial `running` (the same cascade bug
   the creation burst had), which would let the merger play the instant the stage is
   built. `#osp-splash:not(--go)` (id + 2 classes) beats `.osp-splash__orb` (1 class),
   so the splash can be **prebuilt during the black hold yet stay frozen** until it's
   played — that's what lets it crossfade seamlessly out of the moment of creation with
   no black gap. */
#osp-splash:not(.osp-splash--go) .osp-splash__stage > * {
  animation-play-state: paused;
}
/* The binary-merger choreography (sized in vmin so the final event horizon lines
   up with the real shadow at the crossfade; tune --core-d against a recording).
   Two big orbs twirl together while a cluster + dust swirls in; at the merger a
   flash, a tilted jet, colour plumes and reverberating shock rings burst forth,
   then the dark event horizon settles into the final circle. This is the one
   place the app "goes crazy with colour". */
.osp-splash__stage {
  --core-d: 38vmin; /* final diameter of the forming event horizon — grows to ≈ the engine
                       shadow at the crossfade (tune against a recording; was 28, too small) */
  position: relative;
  width: 90vmin;
  height: 90vmin;
}
/* The two big inspiralling orbs (a cool + a warm twin). Twirl ~2 turns,
   accelerating, from the rim into the centre where they merge. */
.osp-splash__orb {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-orb, 13vmin);
  height: var(--osp-sp-orb, 13vmin);
  margin: calc(var(--osp-sp-orb, 13vmin) / -2);
  border-radius: 50%;
  will-change: transform, opacity;
  animation: osp-orb calc(0.3s * var(--osp-splash-scale, 1)) cubic-bezier(0.55, 0, 0.78, 1) forwards;
}
/* A warm binary: a hot white-gold twin + an amber twin (no pink/blue). */
.osp-splash__orb--a {
  --a: 0deg;
  background: radial-gradient(circle at 42% 38%, #fff 0%, #fff6e6 32%, #ffe1a8 60%, #ffc164 100%);
  box-shadow:
    0 0 4vmin 1.2vmin rgba(255, 220, 150, 0.7),
    0 0 10vmin 3vmin rgba(255, 180, 90, 0.32);
}
.osp-splash__orb--b {
  --a: 180deg;
  background: radial-gradient(circle at 42% 38%, #fff 0%, #ffe9cf 32%, #ffbf72 60%, #ff8a36 100%);
  box-shadow:
    0 0 4vmin 1.2vmin rgba(255, 175, 95, 0.6),
    0 0 10vmin 3vmin rgba(255, 130, 55, 0.3);
}
/* Frequent keyframes, each rotating < 180°, so the inspiral interpolates the
   same way in every browser — WebKit/Safari decomposes big rotate+translate
   steps to a matrix and takes the short arc, which made the orbs briefly fly
   apart mid-approach. Monotonic radius (27 → 0), accelerating ~2 turns. */
@keyframes osp-orb {
  0% {
    transform: rotate(var(--a)) translateX(27vmin) scale(0.85);
    opacity: 0;
  }
  12% {
    transform: rotate(calc(var(--a) + 85deg)) translateX(23vmin) scale(1);
    opacity: 1;
  }
  30% {
    transform: rotate(calc(var(--a) + 220deg)) translateX(17vmin) scale(1);
    opacity: 1;
  }
  48% {
    transform: rotate(calc(var(--a) + 360deg)) translateX(11.5vmin) scale(1);
    opacity: 1;
  }
  66% {
    transform: rotate(calc(var(--a) + 500deg)) translateX(6.5vmin) scale(0.98);
    opacity: 1;
  }
  84% {
    transform: rotate(calc(var(--a) + 630deg)) translateX(2.5vmin) scale(0.82);
    opacity: 0.55;
  } /* begin dissolving into the flash, so the orbs hand off rather than vanish */
  100% {
    transform: rotate(calc(var(--a) + 730deg)) translateX(0) scale(0.3);
    opacity: 0;
  }
}
/* Merger flash — a white-cyan burst as the orbs coalesce (~0.4s). */
.osp-splash__flash {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-flash, 34vmin);
  height: var(--osp-sp-flash, 34vmin);
  margin: calc(var(--osp-sp-flash, 34vmin) / -2);
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #fff1d6 22%, rgba(255, 200, 120, 0.45) 46%, transparent 70%);
  opacity: 0;
  transform: scale(0.2);
  /* Starts as the orbs close in and lingers, so it bridges the inspiral into the
     ring/streak burst rather than popping as a separate beat. */
  animation: osp-splash-flash calc(0.44s * var(--osp-splash-scale, 1)) ease-out 0.16s forwards;
}
@keyframes osp-splash-flash {
  0% {
    transform: scale(0.2);
    opacity: 0;
  }
  16% {
    transform: scale(1);
    opacity: 1;
  }
  100% {
    transform: scale(2.3);
    opacity: 0;
  }
}
/* A tilted jet flaring across the merger. */
.osp-splash__jet {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 92vmin;
  height: 1.4vmin;
  margin: -0.7vmin 0 0 -46vmin;
  border-radius: 1vmin;
  background: linear-gradient(90deg, transparent 6%, #ffb44f 26%, #fff 50%, #ffd98a 74%, transparent 94%);
  filter: blur(0.4vmin);
  opacity: 0;
  transform: rotate(19deg) scaleX(0.06);
  animation: osp-jet calc(0.36s * var(--osp-splash-scale, 1)) ease-out 0.24s forwards;
}
@keyframes osp-jet {
  0% {
    transform: rotate(19deg) scaleX(0.06);
    opacity: 0;
  }
  22% {
    transform: rotate(19deg) scaleX(1);
    opacity: 0.95;
  }
  100% {
    transform: rotate(19deg) scaleX(1.18);
    opacity: 0;
  }
}
/* Reverberating shock rings — staggered (--sd), neon (--rc), tilted to read as 3D
   rings expanding in waves. A neon glow (box-shadow) + an animated hue-shift make
   them shimmer vibrantly through the spectrum as they expand. */
.osp-splash__shock {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 9vmin;
  height: 9vmin;
  margin: -4.5vmin;
  border-radius: 50%;
  border: 0.5vmin solid var(--rc, #ff4fd8);
  box-shadow:
    0 0 2.4vmin 0.2vmin var(--rc, #ff4fd8),
    inset 0 0 1.2vmin var(--rc, #ff4fd8);
  opacity: 0;
  transform: scale(0.12) rotateX(62deg) rotate(var(--rr, 0deg));
  animation:
    osp-shock calc(0.46s * var(--osp-splash-scale, 1)) cubic-bezier(0.15, 0.7, 0.3, 1) var(--sd, 0.24s) forwards,
    osp-hue calc(0.62s * var(--osp-splash-scale, 1)) linear var(--sd, 0.24s) forwards;
}
@keyframes osp-shock {
  0% {
    transform: scale(0.12) rotateX(62deg) rotate(var(--rr, 0deg));
    opacity: 0;
  }
  12% {
    opacity: 0.95;
  }
  100% {
    transform: scale(var(--osp-sp-shock-x, 7)) rotateX(62deg) rotate(var(--rr, 0deg));
    opacity: 0;
  }
}
/* Cycle the hue (with extra saturation/brightness) so rings + streaks read neon. */
@keyframes osp-hue {
  0% {
    filter: hue-rotate(0deg) saturate(1.5) brightness(1.18);
  }
  100% {
    filter: hue-rotate(170deg) saturate(1.5) brightness(1.18);
  }
}
/* Neon streaks — thin bright rays fired radially from the merger with the rings;
   hue-shifted to read as electric, vibrant flashes (the "streaks" on the rings). */
.osp-splash__streak {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-streak, 58vmin);
  height: 0.5vmin;
  margin: -0.25vmin 0 0 0;
  transform-origin: 0 50%;
  border-radius: 0.5vmin;
  background: linear-gradient(90deg, #fff 0%, var(--kc, #ff2fae) 16%, transparent 82%);
  box-shadow: 0 0 1.3vmin 0.1vmin var(--kc, #ff2fae);
  opacity: 0;
  transform: rotate(var(--a, 0deg)) scaleX(0.04);
  animation:
    osp-streak calc(0.42s * var(--osp-splash-scale, 1)) cubic-bezier(0.1, 0.7, 0.3, 1) 0.24s forwards,
    osp-hue calc(0.62s * var(--osp-splash-scale, 1)) linear 0.24s forwards;
}
@keyframes osp-streak {
  0% {
    transform: rotate(var(--a, 0deg)) scaleX(0.04);
    opacity: 0;
  }
  18% {
    opacity: 0.95;
  }
  100% {
    transform: rotate(var(--a, 0deg)) scaleX(1);
    opacity: 0;
  }
}
/* Colour plumes — gas flung radially outward (angle --a, colour --pc). */
.osp-splash__plume {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 4vmin;
  height: 11vmin;
  margin: -5.5vmin -2vmin;
  border-radius: 50%;
  background: radial-gradient(ellipse at 50% 100%, var(--pc, #ffb24a) 0%, transparent 72%);
  filter: blur(0.7vmin);
  opacity: 0;
  transform: rotate(var(--a)) translateY(0) scale(0.3);
  animation: osp-plume calc(0.42s * var(--osp-splash-scale, 1)) ease-out 0.25s forwards;
}
@keyframes osp-plume {
  0% {
    transform: rotate(var(--a)) translateY(0) scale(0.3);
    opacity: 0;
  }
  28% {
    opacity: 0.85;
  }
  100% {
    transform: rotate(var(--a)) translateY(calc(var(--osp-sp-plume, 24vmin) * -1)) scale(1);
    opacity: 0;
  }
}
/* The gas/dust accretion ring: forms early (≈0.14 s) and *holds* around the
   horizon, warm and tilted nearly disk-flat — unlike the shock rings (which
   expand away). It reads as the accretion ring and is the visual bridge to the
   real disk during the crossfade. */
.osp-splash__disk {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-disk, 44vmin);
  height: var(--osp-sp-disk, 44vmin);
  margin: calc(var(--osp-sp-disk, 44vmin) / -2);
  border-radius: 50%;
  border: 0.55vmin solid rgba(255, 201, 130, 0.92);
  box-shadow:
    0 0 3vmin 0.3vmin rgba(255, 178, 96, 0.55),
    inset 0 0 2vmin rgba(255, 156, 84, 0.5);
  opacity: 0;
  transform: scale(0.2) rotateX(76deg);
  animation: osp-disk calc(0.52s * var(--osp-splash-scale, 1)) cubic-bezier(0.2, 0.8, 0.3, 1) 0.14s forwards;
}
@keyframes osp-disk {
  0% {
    opacity: 0;
    transform: scale(0.2) rotateX(76deg);
  }
  45% {
    opacity: 0.95;
  }
  100% {
    opacity: 0.8;
    transform: scale(1) rotateX(76deg);
  } /* settle and hold (forwards) — the gas ring persists into the crossfade */
}
/* The forming event horizon: holds at a point through the merger, then expands
   back outward (slight overshoot → settle) to the final black circle + a cool
   photon ring. */
.osp-splash__core {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: #05060a;
  animation: osp-splash-core calc(0.56s * var(--osp-splash-scale, 1)) cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
}
@keyframes osp-splash-core {
  0%,
  44% {
    width: 0;
    height: 0;
    box-shadow: 0 0 1vmin 0.2vmin rgba(255, 238, 210, 0);
  }
  80% {
    width: calc(var(--core-d) * 1.06);
    height: calc(var(--core-d) * 1.06);
    box-shadow:
      0 0 5vmin 1.4vmin rgba(255, 240, 214, 0.85),
      inset 0 0 3vmin 1vmin #000;
  } /* expand outward + overshoot */
  100% {
    width: var(--core-d);
    height: var(--core-d);
    box-shadow:
      0 0 4vmin 1.2vmin rgba(255, 236, 206, 0.78),
      inset 0 0 3vmin 1vmin #000;
  } /* settle */
}
/* The canvas dust field (tons of particles: swirl in → burst back out). One
   layer behind the stage; sized/drawn by the inline script. */
.osp-splash__dustcv {
  position: absolute;
  left: 0;
  top: 0;
  pointer-events: none;
}
/* A few much-bigger bodies + small, as crisp CSS elements: spiral inward from
   the rim and shrink as they merge. */
.osp-splash__b {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--s, 1vmin);
  height: var(--s, 1vmin);
  margin: calc(var(--s, 1vmin) / -2);
  border-radius: 50%;
  background: radial-gradient(circle at 42% 40%, #fff 0%, #ffe6c2 70%, #ffb870 100%);
  box-shadow: 0 0 1.2vmin 0.4vmin rgba(255, 195, 120, 0.5);
  transform: rotate(var(--a)) translateX(var(--r, 36vmin));
  animation: osp-splash-fall calc(0.32s * var(--osp-splash-scale, 1)) cubic-bezier(0.4, 0, 0.7, 1) var(--d, 0s) forwards;
}
.osp-splash__b--big {
  box-shadow: 0 0 2.2vmin 0.7vmin rgba(255, 190, 110, 0.55);
}
@keyframes osp-splash-fall {
  0% {
    transform: rotate(var(--a)) translateX(var(--r, 36vmin)) scale(0.6);
    opacity: 0;
  }
  22% {
    opacity: 1;
  }
  78% {
    opacity: 1;
  }
  100% {
    transform: rotate(calc(var(--a) + var(--w, 160deg))) translateX(0vmin) scale(0.14);
    opacity: 0;
  }
}
@media (prefers-reduced-motion: reduce) {
  /* Settle quickly to the formed state rather than the full inspiral/burst.
     (The canvas dust also drops to a small count under reduced motion.) */
  .osp-splash__orb,
  .osp-splash__flash,
  .osp-splash__jet,
  .osp-splash__shock,
  .osp-splash__streak,
  .osp-splash__plume,
  .osp-splash__disk,
  .osp-splash__b {
    animation-duration: 0.01s;
  }
  .osp-splash__core {
    animation-duration: 0.2s;
  }
}

    </style>
  </head>
  <body style="margin: 0; background: #05060a">
    <!-- Moment of creation — self-contained export from the moment-of-creation engine. The
         inline script below paints on the first frame; there is no external app, so
         __ospBoot is a no-op. Zero external dependencies. -->
    <script>
      window.__ospBoot = function () {};
      window.__ospMode = "full";
    </script>
<!-- THE INTRO OVERLAY — one source of truth (src/intro/overlay.html), inlined into
     index.html and intro-lab.html by the introOverlay() plugin in vite.config.ts, so
     the dev tuning lab previews the exact intro the site ships. The dials below are
     mirrored by src/intro/introTimeline.ts (introTimeline.test.ts guards the two). -->
<!-- Load splash: a colourful, JS-free binary-merger "formation". Two big orbs
     twirl together while a cluster + dust swirls in; at the merger a flash,
     a tilted jet, colour plumes and reverberating shock rings burst forth,
     and the dark event horizon settles into the final circle. Paints on first
     paint (static markup + a tiny synchronous generator), so it can't be late. -->
<!-- The intro prelude + "moment of creation". #osp-creation is an opaque,
     near-black full-screen layer from the very first paint (its burst children
     stay invisible until --go), so it doubles as the **black screen** (beat A,
     0.00–0.25s). At ~0.25s the .osp-lines child flashes for a **single frame**
     (beat B: a 40px white/black horizontal test pattern). Then the burst fires
     (beat C: pure CSS — light, beams, reverberating rings, identical on every
     device), the splash overlaps from ~0.05s later, and the creation fades out
     as the splash takes over. All sequenced by the inline __ospIntro below. -->
<div id="osp-creation" aria-hidden="true">
  <div class="osp-lines" aria-hidden="true"></div>
  <i class="osp-cr osp-cr-core"></i>
  <i class="osp-cr osp-cr-flash" style="--d:0s;--c:#fff7e8"></i>
  <i class="osp-cr osp-cr-flash" style="--d:.05s;--c:#ffd9a0"></i>
  <i class="osp-cr osp-cr-ray" style="--a:14deg;--c:#ffe0a0;--d:.01s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:79deg;--c:#ff3cc0;--d:.04s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:142deg;--c:#36e0ff;--d:.02s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:206deg;--c:#fff2d6;--d:.05s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:268deg;--c:#ffae4f;--d:.03s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:331deg;--c:#b06aff;--d:.06s"></i>
  <i class="osp-cr osp-cr-ring" style="--c:#fff2d6;--d:0s"></i>
  <i class="osp-cr osp-cr-ring" style="--c:#36e0ff;--d:.07s"></i>
  <i class="osp-cr osp-cr-ring" style="--c:#ff6aa0;--d:.13s"></i>
</div>
<div id="osp-splash" aria-hidden="true"><div class="osp-splash__stage"></div></div>
<!-- Build the whole splash synchronously (before the module bundle) so it
     paints on first paint. Exposed as window.__ospSplash so "Replay intro"
     can rebuild it (a fresh build restarts every animation). Structured
     elements are CSS; the dust is one cheap canvas layer: hundreds of small,
     mostly-warm, lightly-saturated points that spiral inward then spiral back
     out. Capped backing resolution + small sprites keep it smooth. -->
<script>
  // Push the tunable dials onto CSS custom properties (read by intro.css). Defaults match
  // the CSS var() fallbacks, so an un-tuned overlay (e.g. the verify-intro harness) looks
  // identical. One place per half keeps __ospCreation / __ospIntro from drifting.
  function ospSetCreationVars(cr, D) {
    cr.style.setProperty('--osp-cr-core', (D.crCoreSize != null ? D.crCoreSize : 7) + 'vmax');
    cr.style.setProperty('--osp-cr-flash', (D.crFlashSize != null ? D.crFlashSize : 30) + 'vmax');
    cr.style.setProperty('--osp-cr-ray-len', (D.crRayLength != null ? D.crRayLength : 150) + 'vmax');
    cr.style.setProperty('--osp-cr-ray-w', (D.crRayWidth != null ? D.crRayWidth : 0.7) + 'vmax');
    cr.style.setProperty('--osp-cr-ring-w', (D.crRingThickness != null ? D.crRingThickness : 0.5) + 'vmax');
    cr.style.setProperty('--osp-cr-ring-x', D.crRingExpand != null ? D.crRingExpand : 13);
    cr.style.setProperty('--osp-lines-band', (D.linesBandPx != null ? D.linesBandPx : 40) + 'px');
    cr.style.filter = 'hue-rotate(' + (D.crHue || 0) + 'deg) brightness(' + (D.crBright != null ? D.crBright : 1) + ')';
  }
  function ospSetSplashVars(splash, D) {
    var stage = splash.querySelector('.osp-splash__stage');
    if (stage) stage.style.setProperty('--core-d', (D.spCoreDiameter != null ? D.spCoreDiameter : 38) + 'vmin');
    splash.style.setProperty('--osp-sp-orb', (D.spOrbSize != null ? D.spOrbSize : 13) + 'vmin');
    splash.style.setProperty('--osp-sp-disk', (D.spDiskSize != null ? D.spDiskSize : 44) + 'vmin');
    splash.style.setProperty('--osp-sp-shock-x', D.spShockExpand != null ? D.spShockExpand : 7);
    splash.style.setProperty('--osp-sp-streak', (D.spStreakLength != null ? D.spStreakLength : 58) + 'vmin');
    splash.style.setProperty('--osp-sp-plume', (D.spPlumeReach != null ? D.spPlumeReach : 24) + 'vmin');
    splash.style.setProperty('--osp-sp-flash', (D.spFlashSize != null ? D.spFlashSize : 34) + 'vmin');
    splash.style.filter = 'hue-rotate(' + (D.spHue || 0) + 'deg)';
  }

  // Build the splash (and, unless `defer`, play it immediately). Passing defer=true
  // *prebuilds* it — stage + canvas ready but frozen (CSS paused via the
  // #osp-splash:not(--go) rule; canvas not yet drawing) — so it can be assembled on
  // an idle thread during the black hold and then played instantly, crossfading
  // straight out of the moment of creation with no build hitch and no black gap.
  window.__ospSplash = function (defer) {
    try {
      var splash = document.getElementById('osp-splash');
      var stage = splash && splash.querySelector('.osp-splash__stage');
      if (!stage) return;
      var D = window.__ospDials || {};
      ospSetSplashVars(splash, D); // size/colour custom props + horizon diameter
      splash.classList.remove('osp-splash--hide');
      splash.classList.remove('osp-splash--go'); // a (re)build starts paused until __ospSplashPlay
      splash.__hideAt = 0; // reset the crossfade marker on (re)build
      if (splash.__raf) cancelAnimationFrame(splash.__raf);
      splash.__raf = 0;
      var prev = splash.querySelector('.osp-splash__dustcv');
      if (prev) prev.remove();
      var R = function (a, b) { return a + Math.random() * (b - a); };

      // Structured burst elements (CSS-animated).
      var h = '';
      // Reverberating shock rings: vibrant neon bases; CSS animates a hue-shift
      // + glow so they shimmer through the spectrum as they expand (--sd staggers
      // them, compressed so the whole burst lands inside ~0.65s).
      var SC = [['#ff1f9e', '0.22', '7'], ['#ff7a1f', '0.28', '-11'], ['#14e3ff', '0.34', '3'], ['#c23dff', '0.40', '-5']];
      for (var s = 0; s < SC.length; s++)
        h += '<span class="osp-splash__shock" style="--rc:' + SC[s][0] + ';--sd:' + SC[s][1] + 's;--rr:' + SC[s][2] + 'deg"></span>';
      // Neon streaks — thin bright rays that shoot out with the rings (hue-shifted).
      var KC = ['#ff2fae', '#22e6ff', '#b65cff', '#ffd24a', '#ff5cf0', '#3affd0'], KA = [34, 96, 162, 214, 283, 331];
      for (var kk = 0; kk < KC.length; kk++)
        h += '<span class="osp-splash__streak" style="--a:' + KA[kk] + 'deg;--kc:' + KC[kk] + '"></span>';
      // Gas plumes — kept warm (gold → orange) so the overall colourway reads warm
      // and elegant; the neon lives in the rings + streaks above.
      var PC = ['#ffd24a', '#ffb24a', '#ff8a3c', '#ffe2a0', '#ffc266', '#ff9a48'], PA = [18, 74, 138, 203, 262, 321];
      for (var q = 0; q < PC.length; q++)
        h += '<span class="osp-splash__plume" style="--a:' + PA[q] + 'deg;--pc:' + PC[q] + '"></span>';
      h += '<span class="osp-splash__orb osp-splash__orb--a"></span><span class="osp-splash__orb osp-splash__orb--b"></span>' +
        '<span class="osp-splash__jet"></span><span class="osp-splash__flash"></span>';
      function body(cls, n, sMin, sMax, rMin, rMax, dS) {
        for (var i = 0; i < n; i++)
          h += '<i class="' + cls + '" style="--a:' + R(0, 360).toFixed(1) + 'deg;--s:' + R(sMin, sMax).toFixed(2) +
            'vmin;--r:' + R(rMin, rMax).toFixed(1) + 'vmin;--w:' + R(120, 240).toFixed(0) + 'deg;--d:' + (-R(0, dS)).toFixed(3) + 's"></i>';
      }
      body('osp-splash__b osp-splash__b--big', 3 + ((Math.random() * 2) | 0), 3.2, 5, 24, 40, 0.06);
      body('osp-splash__b', 5 + ((Math.random() * 4) | 0), 0.8, 1.6, 22, 46, 0.14);
      // A warm accretion ring that forms *early* and holds around the horizon
      // (the gas/dust ring), then the event-horizon core settles inside it.
      h += '<span class="osp-splash__disk"></span><span class="osp-splash__core"></span>';
      stage.innerHTML = h;

      // Canvas dust — small, mostly-warm, coherent spiral; cheap (capped res).
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var cv = document.createElement('canvas');
      cv.className = 'osp-splash__dustcv';
      splash.insertBefore(cv, splash.firstChild);
      var ctx = cv.getContext('2d');
      if (!ctx) return;
      var sc = Math.min(1, 1500 / Math.max(innerWidth, innerHeight)); // bound backing buffer
      var W = (cv.width = Math.round(innerWidth * sc));
      var H = (cv.height = Math.round(innerHeight * sc));
      cv.style.width = innerWidth + 'px';
      cv.style.height = innerHeight + 'px';
      var cx = W / 2, cy = H / 2, vmin = Math.min(W, H) / 100;
      function sprite(color) {
        var z = 40, c = document.createElement('canvas');
        c.width = c.height = z;
        var g = c.getContext('2d'), rg = g.createRadialGradient(z / 2, z / 2, 0, z / 2, z / 2, z / 2);
        rg.addColorStop(0, color);
        rg.addColorStop(0.35, color);
        rg.addColorStop(1, 'rgba(0,0,0,0)');
        g.fillStyle = rg;
        g.beginPath();
        g.arc(z / 2, z / 2, z / 2, 0, 6.2832);
        g.fill();
        return c;
      }
      var warm = ['#fff3df', '#ffe6c2', '#ffd49a', '#ffcf86', '#fff7ec', '#ffdca8', '#ffc878'].map(sprite);
      var cool = ['#eef2ff', '#e4ecff'].map(sprite); // a few near-white sparkles, not blue
      var DIR = Math.random() < 0.5 ? 1 : -1; // one swirl direction for the whole field
      var N = Math.max(0, Math.round(D.spDustCount != null ? D.spDustCount : 320));
      if (reduce) N = Math.min(N, 70); // reduced motion caps the field
      var P = new Array(N);
      for (var k = 0; k < N; k++) {
        P[k] = {
          a: R(0, 6.2832), r0: R(22, 54), rmin: R(7, 20), rb: R(30, 86), // breathe r0 → annulus → rb (never the centre)
          tn: DIR * (1.15 + R(-0.2, 0.2)) * (D.spDustSpiral != null ? D.spDustSpiral : 1), om: DIR * (0.5 + R(0, 0.9)), // inspiral wind (× spDustSpiral) + drift
          mg: 0.2 + R(0, 0.16), // staggered turn time, so the field never converges/bursts in unison
          sz: (0.16 + Math.pow(Math.random(), 2.2) * 0.95) * vmin * (D.spDustSize != null ? D.spDustSize : 1), dl: R(0, 0.05),
          spr: Math.random() < 0.05 ? cool[(Math.random() * cool.length) | 0] : warm[(Math.random() * warm.length) | 0],
        };
      }
      var t0 = 0, STOP = 1.7;
      function draw(now) {
        if (!t0) {
          // Start the clock AND the CSS choreography (--go) on the first
          // *painted* frame, not at parse: mobile Safari often defers the
          // first paint past the short splash, so a parse-time timeline meant
          // the merger was never seen. This also locks the CSS layers to this
          // canvas, and lets main.ts hold the crossfade until the splash has
          // actually played (window.__ospSplashStart).
          t0 = now;
          window.__ospSplashStart = now;
          splash.classList.add('osp-splash--go');
        }
        var t = (now - t0) / 1000;
        ctx.clearRect(0, 0, W, H);
        ctx.globalCompositeOperation = 'lighter';
        for (var j = 0; j < N; j++) {
          var p = P[j], tt = t - p.dl;
          if (tt < 0) continue;
          // One continuous "breath" per particle (no hard inward/burst/drift
          // boundaries that read as separate beats), turning at its own time
          // (p.mg) through an *annulus* (p.rmin, not the centre — so the field
          // never piles into a static central clot).
          var r, grow;
          if (tt < p.mg) {
            var e = tt / p.mg, ei = e * (2 - e); // ease-out inward, moving from frame 1
            r = p.r0 + (p.rmin - p.r0) * ei;
            grow = 1;
          } else {
            var td = tt - p.mg, k = td / 0.35; // smoothstep out of the turn, then gaseous drift
            var eo = k < 1 ? k * k * (3 - 2 * k) : 1;
            r = p.rmin + (p.rb - p.rmin) * eo + (td > 0.35 ? (td - 0.35) * 12 : 0);
            grow = 1 + eo + (td > 0.35 ? (td - 0.35) * 0.8 : 0);
          }
          // Alpha: quick in, hold across the turn, then a gentle gaseous fade —
          // no pop in or out.
          var al = Math.min(1, tt * 12), fs = p.mg + 0.34;
          if (tt > fs) al *= Math.max(0, 1 - (tt - fs));
          if (al <= 0.02) continue;
          // Always rotating: the inspiral wind (caps after the turn) plus a
          // constant drift, so nothing is ever momentarily static.
          var w = Math.min(1, tt / p.mg); w = w * (2 - w);
          var ang = p.a + p.tn * 6.2832 * w + p.om * tt;
          var z = p.sz * grow;
          ctx.globalAlpha = al;
          ctx.drawImage(p.spr, cx + Math.cos(ang) * r * vmin - z, cy + Math.sin(ang) * r * vmin - z, z * 2, z * 2);
        }
        ctx.globalAlpha = 1;
        // Keep drifting *through* the crossfade — the div's opacity fades the
        // dust out as the engine is revealed — then stop to free the GPU.
        if (splash.classList.contains('osp-splash--hide') && !splash.__hideAt) splash.__hideAt = t;
        if (t < STOP && !(splash.__hideAt && t > splash.__hideAt + 0.5)) splash.__raf = requestAnimationFrame(draw);
        else { ctx.clearRect(0, 0, W, H); splash.__raf = 0; splash.__hideAt = 0; }
      }
      splash.__draw = draw; // stored so __ospSplashPlay can start a prebuilt splash
      if (!defer) window.__ospSplashPlay(); // default (and replay): build + play together
    } catch (e) {
      /* the splash is non-essential — never let it break the page */
    }
  };
  // Play a (possibly prebuilt) splash: schedule its first canvas frame — which adds
  // --go (un-pausing the merger), stamps __ospSplashStart, and animates the dust.
  window.__ospSplashPlay = function () {
    var splash = document.getElementById('osp-splash');
    if (!splash || !splash.__draw || splash.__raf) return;
    splash.__raf = requestAnimationFrame(splash.__draw);
  };

  // ===== Intro dials — the one place to tune the load intro ==============
  // The bundle mirrors these in src/intro/introTimeline.ts (the inline-sync test
  // guards the two). Times are ms; *speeds* are duration multipliers (1 = as
  // authored, 2 = twice as slow, 0.5 = twice as fast). Exposed on window so you can
  // tweak live in the console, then "Replay intro".
  window.__ospDials = {
    // creation half — timing + the burst's sizes/colour (mirror of dials.json scope:creation)
    initialBlackMs: 500,
    splitBlackMs: 70,
    creationSpeed: 1,
    crCoreSize: 7,
    crFlashSize: 30,
    crRayLength: 150,
    crRayWidth: 0.7,
    crRingThickness: 0.5,
    crRingExpand: 13,
    crHue: 0,
    crBright: 1,
    linesBandPx: 40,
    // splash half — speed + the merger's sizes/colour/dust (scope:splash)
    splashSpeed: 1,
    spOrbSize: 13,
    spCoreDiameter: 38,
    spDiskSize: 44,
    spShockExpand: 7,
    spStreakLength: 58,
    spPlumeReach: 24,
    spFlashSize: 34,
    spHue: 0,
    spDustCount: 320,
    spDustSize: 1,
    spDustSpiral: 1,
    // sequencing — how the two halves combine (scope:sequence)
    creationBeatMs: 240,
    creationToSplashMs: -80,
    creationFadeMs: 120,
    splashHoldMs: 600,
    splashFadeMs: 450,
  };

  // The whole intro, sequenced off the *first painted frame* (so a deferred mobile
  // paint still plays it in full). All timings/speeds come from window.__ospDials:
  //   boot engine  start    (parse runs *under the black*, so the splash is smooth)
  //   beat A · black hold    initialBlackMs       (#osp-creation opaque; burst paused)
  //   · prebuild splash      ~200ms before B      (idle, hidden under the creation)
  //   beat B · test pattern  at initialBlackMs    (.osp-lines, one painted frame)
  //   · split black          splitBlackMs         (a deliberate tiny black)
  //   beat C · creation      then                 (--go fires the CSS firework)
  //   beat D · splash plays  creationBeatMs(+overlap), the creation fades into it
  window.__ospIntro = function () {
    var D = window.__ospDials;
    try {
      var cr = document.getElementById('osp-creation');
      var splash = document.getElementById('osp-splash');
      var lines = cr && cr.querySelector('.osp-lines');
      if (cr) {
        cr.className = 'osp-creation'; // reset for replay (drop --go / --hide)
        cr.style.setProperty('--osp-cr-scale', D.creationSpeed); // (c) creation speed
        cr.style.setProperty('--osp-cr-fade', D.creationFadeMs / 1000 + 's'); // (e) crossfade speed
        ospSetCreationVars(cr, D); // burst sizes / colour from the dials
        // Restart the burst's CSS animations so **Replay** plays them again: they
        // completed on the first run (forwards), and toggling --go alone just resumes
        // them at 100% — a reflow on the parent doesn't restart the reused children.
        var crs = cr.getElementsByClassName('osp-cr');
        for (var ci = 0; ci < crs.length; ci++) crs[ci].style.animation = 'none';
        void cr.offsetWidth; // reflow registers the 'none' so the next line restarts from 0
        for (var cj = 0; cj < crs.length; cj++) crs[cj].style.animation = '';
      }
      if (splash) {
        splash.style.setProperty('--osp-splash-scale', D.splashSpeed); // (d) splash speed
        splash.style.setProperty('--osp-splash-fade', D.splashFadeMs / 1000 + 's'); // (f) crossfade speed
      }
      if (lines) lines.className = 'osp-lines'; // reset the test-pattern flash for replay
      window.__ospSplashStart = undefined; // a fresh intro: wait for the new splash's first frame
      requestAnimationFrame(function () {
        // Boot the heavy engine bundle at the *start* of the intro, so its ~860KB parse
        // + WebGPU init happen under the black hold — not later, where they froze the
        // splash's dust canvas and lagged its first paint. The black absorbs the load.
        if (window.__ospBoot && !window.__ospBooted) { window.__ospBooted = true; window.__ospBoot(); }
        // Prebuild the splash during the black hold (idle, hidden) so it plays instantly.
        window.setTimeout(function () { window.__ospSplash(true); }, Math.max(0, D.initialBlackMs - 200));
        // beat A — hold pure black.
        window.setTimeout(function () {
          // beat B — the interference pattern: a brief flash over the black.
          if (lines) lines.classList.add('osp-lines--on');
          requestAnimationFrame(function () { // frame 1: the pattern is painted
            requestAnimationFrame(function () { // frame 2: drop the pattern → a split-second of black
              if (lines) lines.classList.remove('osp-lines--on');
              // ...a deliberate tiny black after the interference, then straight into:
              window.setTimeout(function () {
                if (cr) cr.classList.add('osp-creation--go'); // beat C — the moment of creation (its own beat)
                // beat D — play the prebuilt splash near the creation's end (overlap dial) and
                // fade the creation into it. Negative overlap = splash a touch *before* the fade,
                // so there's no black gap and the orbs play fresh + visible.
                window.setTimeout(window.__ospSplashPlay, Math.max(0, D.creationBeatMs + D.creationToSplashMs));
                window.setTimeout(function () { if (cr) cr.classList.add('osp-creation--hide'); }, D.creationBeatMs);
              }, D.splitBlackMs);
            });
          });
        }, D.initialBlackMs);
      });
      // Safety net: guarantee the engine loads even if the boot above was somehow skipped.
      window.setTimeout(function () {
        if (window.__ospBoot && !window.__ospBooted) { window.__ospBooted = true; window.__ospBoot(); }
      }, 1400);
    } catch (e) {
      window.__ospSplash(); // never let the intro break the page
    }
  };

  // ===== The two halves of the moment of creation, playable on their own ===========
  // The intro is two animations in sequence — the creation burst and the binary-merger
  // splash. These play either half alone (selected by window.__ospMode); 'full' (the
  // default, __ospIntro above) is the whole thing. Same markup + intro.css throughout.

  // Just the moment-of-creation burst: black hold → test pattern → burst, splash hidden.
  window.__ospCreation = function () {
    var D = window.__ospDials;
    try {
      var cr = document.getElementById('osp-creation');
      var splash = document.getElementById('osp-splash');
      var lines = cr && cr.querySelector('.osp-lines');
      if (splash) splash.style.display = 'none';
      if (!cr) return;
      cr.style.display = '';
      cr.className = 'osp-creation';
      cr.style.setProperty('--osp-cr-scale', D.creationSpeed);
      ospSetCreationVars(cr, D); // burst sizes / colour from the dials
      var crs = cr.getElementsByClassName('osp-cr');
      for (var ci = 0; ci < crs.length; ci++) crs[ci].style.animation = 'none';
      void cr.offsetWidth; // reflow so the burst restarts on replay (see __ospIntro)
      for (var cj = 0; cj < crs.length; cj++) crs[cj].style.animation = '';
      if (lines) lines.className = 'osp-lines';
      requestAnimationFrame(function () {
        window.setTimeout(function () {
          if (lines) lines.classList.add('osp-lines--on');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (lines) lines.classList.remove('osp-lines--on');
              window.setTimeout(function () { cr.classList.add('osp-creation--go'); }, D.splitBlackMs);
            });
          });
        }, D.initialBlackMs);
      });
    } catch (e) {
      /* the burst is non-essential — never let it break the page */
    }
  };

  // Just the binary-merger splash: creation hidden, build + play the merger.
  window.__ospSplashOnly = function () {
    var D = window.__ospDials;
    try {
      var cr = document.getElementById('osp-creation');
      var splash = document.getElementById('osp-splash');
      if (cr) cr.style.display = 'none';
      if (splash) {
        splash.style.display = '';
        splash.style.setProperty('--osp-splash-scale', D.splashSpeed);
      }
      window.__ospSplash(); // build + play
    } catch (e) {
      window.__ospSplash();
    }
  };

  // The generic engine entry: play the whole intro, or one half, per window.__ospMode
  // (set by the registry/lab/export). Default 'full' is the original moment of creation.
  window.__ospPlay = function () {
    var mode = window.__ospMode || 'full';
    if (mode === 'creation') return window.__ospCreation();
    if (mode === 'splash') return window.__ospSplashOnly();
    return window.__ospIntro();
  };
  window.__ospPlay();
</script>

    <script>
      (function () {
      window.setInterval(function () { if (window.__ospPlay) window.__ospPlay(); }, 3410);
      })();
    </script>
  </body>
</html>
