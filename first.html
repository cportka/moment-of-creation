<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>First</title>
    <style>
/*
 * The intro stylesheet — the moment of creation, the binary-merger splash, and the
 * Replay "melt inward", split out of the app stylesheet so the whole intro is one
 * self-contained, forkable unit (see src/intro/README.md). Loaded as its own
 * <link> by index.html (alongside the app styles) and by intro-lab.html (on its
 * own). All selectors are namespaced #osp-creation / #osp-splash / .osp-cr /
 * .osp-lines / .osp-melting and drive the inline boot script in overlay.html via
 * the --osp-* custom properties (the dials).
 */
/* Replay's "melt inward" (src/intro/melt.ts): the live engine canvas collapses
   toward the One Still Point at the centre of the screen — scaling + spinning down
   to a point, blurring and fading to black — over 2s (== INTRO_TIMING.meltMs),
   before the intro replays from the black screen. forwards holds it melted-away
   (black) through the black-hold beat; melt.restore() clears it under the splash. */
canvas.osp-melting {
  animation: osp-melt 2s cubic-bezier(0.6, 0, 0.9, 0.35) forwards;
  transform-origin: 50% 50%;
  will-change: transform, opacity, filter;
}
@keyframes osp-melt {
  0% {
    transform: scale(1) rotate(0deg);
    filter: blur(0);
    opacity: 1;
  }
  60% {
    filter: blur(5px);
    opacity: 0.92;
  }
  100% {
    transform: scale(0.012) rotate(150deg);
    filter: blur(26px);
    opacity: 0;
  }
}

/* --- The "moment of creation" (intro beat 0, ~0.0–0.18s). A separate, cheap
   mechanism from the splash: pure CSS (no canvas / JS loop), GPU-composited
   transforms + gradients only (no blur), so it's instant and identical on every
   device. A full-screen burst of light, neon beams and reverberating rings. The
   inline script adds --go on the first painted frame, then --hide as the splash
   takes over (overlapping from ~0.1s). Kept smooth, not strobing. --- */
#osp-creation {
  position: fixed;
  inset: 0;
  z-index: 2100; /* above the splash (2000) until it fades out */
  background: #05060a; /* same as the splash, so the cross-fade reveals it seamlessly */
  overflow: hidden;
  pointer-events: none;
  opacity: 1;
  transition: opacity var(--osp-cr-fade, 0.12s) ease; /* (e) creation→splash crossfade speed */
}
#osp-creation.osp-creation--hide {
  opacity: 0;
}
.osp-cr {
  position: absolute;
  left: 50%;
  top: 50%;
  opacity: 0;
  will-change: transform, opacity;
  animation-fill-mode: forwards;
}
/* Hold the ENTIRE burst paused until the black hold + test pattern have played and the
   inline script adds --go. This rule needs **higher specificity** than the per-element
   `animation:` shorthands below — the shorthand resets `animation-play-state` to its
   initial `running`, which is the bug that made the burst fire on page-load (before the
   black). `#osp-creation:not(--go) .osp-cr` (id + 2 classes) beats `.osp-cr-core` (1
   class), so the burst genuinely waits; once --go lands, :not stops matching and each
   element's own `running` resumes it from 0%. */
#osp-creation:not(.osp-creation--go) .osp-cr {
  animation-play-state: paused;
}
/* The white-hot seed at the centre. */
.osp-cr-core {
  width: var(--osp-cr-core, 7vmax);
  height: var(--osp-cr-core, 7vmax);
  margin: calc(var(--osp-cr-core, 7vmax) / -2);
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #fff6e0 38%, transparent 72%);
  animation: osp-cr-core calc(0.18s * var(--osp-cr-scale, 1)) ease-out;
}
@keyframes osp-cr-core {
  0% { transform: scale(0); opacity: 0; }
  28% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.18); opacity: 0; }
}
/* Full-screen flashes of light. */
.osp-cr-flash {
  width: var(--osp-cr-flash, 30vmax);
  height: var(--osp-cr-flash, 30vmax);
  margin: calc(var(--osp-cr-flash, 30vmax) / -2);
  border-radius: 50%;
  background: radial-gradient(circle, var(--c, #fff) 0%, rgba(255, 255, 255, 0.28) 30%, transparent 62%);
  animation: osp-cr-flash calc(0.2s * var(--osp-cr-scale, 1)) ease-out var(--d, 0s);
}
@keyframes osp-cr-flash {
  0% { transform: scale(0.04); opacity: 0; }
  22% { opacity: 0.95; }
  100% { transform: scale(8); opacity: 0; }
}
/* Neon beams sweeping out to the edges. */
.osp-cr-ray {
  width: var(--osp-cr-ray-len, 150vmax);
  height: var(--osp-cr-ray-w, 0.7vmax);
  margin: calc(var(--osp-cr-ray-w, 0.7vmax) / -2) 0 0 0;
  transform-origin: 0 50%;
  border-radius: 1vmax;
  background: linear-gradient(90deg, #fff 0%, var(--c, #fff) 16%, transparent 72%);
  animation: osp-cr-ray calc(0.22s * var(--osp-cr-scale, 1)) cubic-bezier(0.1, 0.7, 0.3, 1) var(--d, 0s);
}
@keyframes osp-cr-ray {
  0% { transform: rotate(var(--a, 0deg)) scaleX(0.02); opacity: 0; }
  25% { opacity: 0.9; }
  100% { transform: rotate(var(--a, 0deg)) scaleX(1); opacity: 0; }
}
/* Reverberating shock rings. */
.osp-cr-ring {
  width: 12vmax;
  height: 12vmax;
  margin: -6vmax;
  border-radius: 50%;
  border: var(--osp-cr-ring-w, 0.5vmax) solid var(--c, #fff);
  animation: osp-cr-ring calc(0.28s * var(--osp-cr-scale, 1)) ease-out var(--d, 0s);
}
@keyframes osp-cr-ring {
  0% { transform: scale(0.1); opacity: 0; }
  18% { opacity: 0.85; }
  100% { transform: scale(var(--osp-cr-ring-x, 13)); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .osp-cr {
    animation-duration: 0.01s;
  }
}
/* Beat B — the single-frame test pattern: full-screen horizontal bands 40px tall,
   alternating white/black. The inline script shows it for exactly one painted frame
   (no transition — a literal 1-frame flash), above the still-paused creation burst.
   A deliberate "sync frame" / academy-leader strobe between the black and the birth. */
.osp-lines {
  position: absolute;
  inset: 0;
  z-index: 10; /* above the burst children within #osp-creation */
  background: repeating-linear-gradient(180deg, #fff 0 var(--osp-lines-band, 40px), #000 var(--osp-lines-band, 40px) calc(var(--osp-lines-band, 40px) * 2));
  opacity: 0;
  pointer-events: none;
}
.osp-lines.osp-lines--on {
  opacity: 1;
}

/* --- Load splash (Phase 15): an instant, JS-free black-and-white "formation"
   that paints before the WebGPU shader compiles, then crossfades to the live
   scene. A cluster of bodies spirals inward (accretion) and merges into the
   forming event horizon + photon ring. main.ts adds .osp-splash--hide once the
   first real frame is on screen, and removes the node after the fade. --- */
#osp-splash {
  position: fixed;
  inset: 0;
  z-index: 2000; /* above the canvas and the (collapsed) panel during load */
  background: #05060a;
  display: grid;
  place-items: center;
  opacity: 1;
  /* No *show* transition: a replay must cover the live scene instantly (no old
     frame bleeding through). Only the dismiss fades — see .osp-splash--hide. */
}
#osp-splash.osp-splash--hide {
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--osp-splash-fade, 0.45s) ease; /* (f) splash→engine crossfade speed */
}
/* Hold the merger choreography paused until --go (added on the splash's first canvas
   frame). This must out-specify the per-element `animation:` shorthands below — the
   shorthand resets animation-play-state to its initial `running` (the same cascade bug
   the creation burst had), which would let the merger play the instant the stage is
   built. `#osp-splash:not(--go)` (id + 2 classes) beats `.osp-splash__orb` (1 class),
   so the splash can be **prebuilt during the black hold yet stay frozen** until it's
   played — that's what lets it crossfade seamlessly out of the moment of creation with
   no black gap. */
#osp-splash:not(.osp-splash--go) .osp-splash__stage > * {
  animation-play-state: paused;
}
/* The binary-merger choreography (sized in vmin so the final event horizon lines
   up with the real shadow at the crossfade; tune --core-d against a recording).
   Two big orbs twirl together while a cluster + dust swirls in; at the merger a
   flash, a tilted jet, colour plumes and reverberating shock rings burst forth,
   then the dark event horizon settles into the final circle. This is the one
   place the app "goes crazy with colour". */
.osp-splash__stage {
  --core-d: 38vmin; /* final diameter of the forming event horizon — grows to ≈ the engine
                       shadow at the crossfade (tune against a recording; was 28, too small) */
  position: relative;
  width: 90vmin;
  height: 90vmin;
}
/* The two big inspiralling orbs (a cool + a warm twin). Twirl ~2 turns,
   accelerating, from the rim into the centre where they merge. */
.osp-splash__orb {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-orb, 13vmin);
  height: var(--osp-sp-orb, 13vmin);
  margin: calc(var(--osp-sp-orb, 13vmin) / -2);
  border-radius: 50%;
  will-change: transform, opacity;
  animation: osp-orb calc(0.3s * var(--osp-splash-scale, 1)) cubic-bezier(0.55, 0, 0.78, 1) forwards;
}
/* A warm binary: a hot white-gold twin + an amber twin (no pink/blue). */
.osp-splash__orb--a {
  --a: 0deg;
  background: radial-gradient(circle at 42% 38%, #fff 0%, #fff6e6 32%, #ffe1a8 60%, #ffc164 100%);
  box-shadow:
    0 0 4vmin 1.2vmin rgba(255, 220, 150, 0.7),
    0 0 10vmin 3vmin rgba(255, 180, 90, 0.32);
}
.osp-splash__orb--b {
  --a: 180deg;
  background: radial-gradient(circle at 42% 38%, #fff 0%, #ffe9cf 32%, #ffbf72 60%, #ff8a36 100%);
  box-shadow:
    0 0 4vmin 1.2vmin rgba(255, 175, 95, 0.6),
    0 0 10vmin 3vmin rgba(255, 130, 55, 0.3);
}
/* Frequent keyframes, each rotating < 180°, so the inspiral interpolates the
   same way in every browser — WebKit/Safari decomposes big rotate+translate
   steps to a matrix and takes the short arc, which made the orbs briefly fly
   apart mid-approach. Monotonic radius (27 → 0), accelerating ~2 turns. */
@keyframes osp-orb {
  0% {
    transform: rotate(var(--a)) translateX(27vmin) scale(0.85);
    opacity: 0;
  }
  12% {
    transform: rotate(calc(var(--a) + 85deg)) translateX(23vmin) scale(1);
    opacity: 1;
  }
  30% {
    transform: rotate(calc(var(--a) + 220deg)) translateX(17vmin) scale(1);
    opacity: 1;
  }
  48% {
    transform: rotate(calc(var(--a) + 360deg)) translateX(11.5vmin) scale(1);
    opacity: 1;
  }
  66% {
    transform: rotate(calc(var(--a) + 500deg)) translateX(6.5vmin) scale(0.98);
    opacity: 1;
  }
  84% {
    transform: rotate(calc(var(--a) + 630deg)) translateX(2.5vmin) scale(0.82);
    opacity: 0.55;
  } /* begin dissolving into the flash, so the orbs hand off rather than vanish */
  100% {
    transform: rotate(calc(var(--a) + 730deg)) translateX(0) scale(0.3);
    opacity: 0;
  }
}
/* Merger flash — a white-cyan burst as the orbs coalesce (~0.4s). */
.osp-splash__flash {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-flash, 34vmin);
  height: var(--osp-sp-flash, 34vmin);
  margin: calc(var(--osp-sp-flash, 34vmin) / -2);
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #fff1d6 22%, rgba(255, 200, 120, 0.45) 46%, transparent 70%);
  opacity: 0;
  transform: scale(0.2);
  /* Starts as the orbs close in and lingers, so it bridges the inspiral into the
     ring/streak burst rather than popping as a separate beat. */
  animation: osp-splash-flash calc(0.44s * var(--osp-splash-scale, 1)) ease-out 0.16s forwards;
}
@keyframes osp-splash-flash {
  0% {
    transform: scale(0.2);
    opacity: 0;
  }
  16% {
    transform: scale(1);
    opacity: 1;
  }
  100% {
    transform: scale(2.3);
    opacity: 0;
  }
}
/* A tilted jet flaring across the merger. */
.osp-splash__jet {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 92vmin;
  height: 1.4vmin;
  margin: -0.7vmin 0 0 -46vmin;
  border-radius: 1vmin;
  background: linear-gradient(90deg, transparent 6%, #ffb44f 26%, #fff 50%, #ffd98a 74%, transparent 94%);
  filter: blur(0.4vmin);
  opacity: 0;
  transform: rotate(19deg) scaleX(0.06);
  animation: osp-jet calc(0.36s * var(--osp-splash-scale, 1)) ease-out 0.24s forwards;
}
@keyframes osp-jet {
  0% {
    transform: rotate(19deg) scaleX(0.06);
    opacity: 0;
  }
  22% {
    transform: rotate(19deg) scaleX(1);
    opacity: 0.95;
  }
  100% {
    transform: rotate(19deg) scaleX(1.18);
    opacity: 0;
  }
}
/* Reverberating shock rings — staggered (--sd), neon (--rc), tilted to read as 3D
   rings expanding in waves. A neon glow (box-shadow) + an animated hue-shift make
   them shimmer vibrantly through the spectrum as they expand. */
.osp-splash__shock {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 9vmin;
  height: 9vmin;
  margin: -4.5vmin;
  border-radius: 50%;
  border: 0.5vmin solid var(--rc, #ff4fd8);
  box-shadow:
    0 0 2.4vmin 0.2vmin var(--rc, #ff4fd8),
    inset 0 0 1.2vmin var(--rc, #ff4fd8);
  opacity: 0;
  transform: scale(0.12) rotateX(62deg) rotate(var(--rr, 0deg));
  animation:
    osp-shock calc(0.46s * var(--osp-splash-scale, 1)) cubic-bezier(0.15, 0.7, 0.3, 1) var(--sd, 0.24s) forwards,
    osp-hue calc(0.62s * var(--osp-splash-scale, 1)) linear var(--sd, 0.24s) forwards;
}
@keyframes osp-shock {
  0% {
    transform: scale(0.12) rotateX(62deg) rotate(var(--rr, 0deg));
    opacity: 0;
  }
  12% {
    opacity: 0.95;
  }
  100% {
    transform: scale(var(--osp-sp-shock-x, 7)) rotateX(62deg) rotate(var(--rr, 0deg));
    opacity: 0;
  }
}
/* Cycle the hue (with extra saturation/brightness) so rings + streaks read neon. */
@keyframes osp-hue {
  0% {
    filter: hue-rotate(0deg) saturate(1.5) brightness(1.18);
  }
  100% {
    filter: hue-rotate(170deg) saturate(1.5) brightness(1.18);
  }
}
/* Neon streaks — thin bright rays fired radially from the merger with the rings;
   hue-shifted to read as electric, vibrant flashes (the "streaks" on the rings). */
.osp-splash__streak {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-streak, 58vmin);
  height: 0.5vmin;
  margin: -0.25vmin 0 0 0;
  transform-origin: 0 50%;
  border-radius: 0.5vmin;
  background: linear-gradient(90deg, #fff 0%, var(--kc, #ff2fae) 16%, transparent 82%);
  box-shadow: 0 0 1.3vmin 0.1vmin var(--kc, #ff2fae);
  opacity: 0;
  transform: rotate(var(--a, 0deg)) scaleX(0.04);
  animation:
    osp-streak calc(0.42s * var(--osp-splash-scale, 1)) cubic-bezier(0.1, 0.7, 0.3, 1) 0.24s forwards,
    osp-hue calc(0.62s * var(--osp-splash-scale, 1)) linear 0.24s forwards;
}
@keyframes osp-streak {
  0% {
    transform: rotate(var(--a, 0deg)) scaleX(0.04);
    opacity: 0;
  }
  18% {
    opacity: 0.95;
  }
  100% {
    transform: rotate(var(--a, 0deg)) scaleX(1);
    opacity: 0;
  }
}
/* Colour plumes — gas flung radially outward (angle --a, colour --pc). */
.osp-splash__plume {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 4vmin;
  height: 11vmin;
  margin: -5.5vmin -2vmin;
  border-radius: 50%;
  background: radial-gradient(ellipse at 50% 100%, var(--pc, #ffb24a) 0%, transparent 72%);
  filter: blur(0.7vmin);
  opacity: 0;
  transform: rotate(var(--a)) translateY(0) scale(0.3);
  animation: osp-plume calc(0.42s * var(--osp-splash-scale, 1)) ease-out 0.25s forwards;
}
@keyframes osp-plume {
  0% {
    transform: rotate(var(--a)) translateY(0) scale(0.3);
    opacity: 0;
  }
  28% {
    opacity: 0.85;
  }
  100% {
    transform: rotate(var(--a)) translateY(calc(var(--osp-sp-plume, 24vmin) * -1)) scale(1);
    opacity: 0;
  }
}
/* The gas/dust accretion ring: forms early (≈0.14 s) and *holds* around the
   horizon, warm and tilted nearly disk-flat — unlike the shock rings (which
   expand away). It reads as the accretion ring and is the visual bridge to the
   real disk during the crossfade. */
.osp-splash__disk {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--osp-sp-disk, 44vmin);
  height: var(--osp-sp-disk, 44vmin);
  margin: calc(var(--osp-sp-disk, 44vmin) / -2);
  border-radius: 50%;
  border: 0.55vmin solid rgba(255, 201, 130, 0.92);
  box-shadow:
    0 0 3vmin 0.3vmin rgba(255, 178, 96, 0.55),
    inset 0 0 2vmin rgba(255, 156, 84, 0.5);
  opacity: 0;
  transform: scale(0.2) rotateX(76deg);
  animation: osp-disk calc(0.52s * var(--osp-splash-scale, 1)) cubic-bezier(0.2, 0.8, 0.3, 1) 0.14s forwards;
}
@keyframes osp-disk {
  0% {
    opacity: 0;
    transform: scale(0.2) rotateX(76deg);
  }
  45% {
    opacity: 0.95;
  }
  100% {
    opacity: 0.8;
    transform: scale(1) rotateX(76deg);
  } /* settle and hold (forwards) — the gas ring persists into the crossfade */
}
/* The forming event horizon: holds at a point through the merger, then expands
   back outward (slight overshoot → settle) to the final black circle + a cool
   photon ring. */
.osp-splash__core {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: #05060a;
  animation: osp-splash-core calc(0.56s * var(--osp-splash-scale, 1)) cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
}
@keyframes osp-splash-core {
  0%,
  44% {
    width: 0;
    height: 0;
    box-shadow: 0 0 1vmin 0.2vmin rgba(255, 238, 210, 0);
  }
  80% {
    width: calc(var(--core-d) * 1.06);
    height: calc(var(--core-d) * 1.06);
    box-shadow:
      0 0 5vmin 1.4vmin rgba(255, 240, 214, 0.85),
      inset 0 0 3vmin 1vmin #000;
  } /* expand outward + overshoot */
  100% {
    width: var(--core-d);
    height: var(--core-d);
    box-shadow:
      0 0 4vmin 1.2vmin rgba(255, 236, 206, 0.78),
      inset 0 0 3vmin 1vmin #000;
  } /* settle */
}
/* The canvas dust field (tons of particles: swirl in → burst back out). One
   layer behind the stage; sized/drawn by the inline script. */
.osp-splash__dustcv {
  position: absolute;
  left: 0;
  top: 0;
  pointer-events: none;
}
/* A few much-bigger bodies + small, as crisp CSS elements: spiral inward from
   the rim and shrink as they merge. */
.osp-splash__b {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--s, 1vmin);
  height: var(--s, 1vmin);
  margin: calc(var(--s, 1vmin) / -2);
  border-radius: 50%;
  background: radial-gradient(circle at 42% 40%, #fff 0%, #ffe6c2 70%, #ffb870 100%);
  box-shadow: 0 0 1.2vmin 0.4vmin rgba(255, 195, 120, 0.5);
  transform: rotate(var(--a)) translateX(var(--r, 36vmin));
  animation: osp-splash-fall calc(0.32s * var(--osp-splash-scale, 1)) cubic-bezier(0.4, 0, 0.7, 1) var(--d, 0s) forwards;
}
.osp-splash__b--big {
  box-shadow: 0 0 2.2vmin 0.7vmin rgba(255, 190, 110, 0.55);
}
@keyframes osp-splash-fall {
  0% {
    transform: rotate(var(--a)) translateX(var(--r, 36vmin)) scale(0.6);
    opacity: 0;
  }
  22% {
    opacity: 1;
  }
  78% {
    opacity: 1;
  }
  100% {
    transform: rotate(calc(var(--a) + var(--w, 160deg))) translateX(0vmin) scale(0.14);
    opacity: 0;
  }
}
@media (prefers-reduced-motion: reduce) {
  /* Settle quickly to the formed state rather than the full inspiral/burst.
     (The canvas dust also drops to a small count under reduced motion.) */
  .osp-splash__orb,
  .osp-splash__flash,
  .osp-splash__jet,
  .osp-splash__shock,
  .osp-splash__streak,
  .osp-splash__plume,
  .osp-splash__disk,
  .osp-splash__b {
    animation-duration: 0.01s;
  }
  .osp-splash__core {
    animation-duration: 0.2s;
  }
}

    </style>
  </head>
  <body style="margin: 0; background: #05060a">
    <!-- First — self-contained export from the moment-of-creation engine. The
         inline script below paints on the first frame; there is no external app, so
         __ospBoot is a no-op. Zero external dependencies. -->
    <script>
      window.__ospBoot = function () {};
      window.__ospMode = "first";
    </script>
<!-- THE INTRO OVERLAY — one source of truth (src/intro/overlay.html), inlined into
     index.html and intro-lab.html by the introOverlay() plugin in vite.config.ts, so
     the dev tuning lab previews the exact intro the site ships. The dials below are
     mirrored by src/intro/introTimeline.ts (introTimeline.test.ts guards the two). -->
<!-- The First (a CSS firework birth) and the Last (a binary merger that resolves into
     a selectable neon Form) combine into the Together. Both paint on first paint:
     static markup + a tiny synchronous generator + one cheap canvas of vector neon
     (slices of light + a geometric Form), with a light dust accent. Snappy by design —
     a handful of strokes, not thousands of particles. -->
<div id="osp-creation" aria-hidden="true">
  <div class="osp-lines" aria-hidden="true"></div>
  <i class="osp-cr osp-cr-core"></i>
  <i class="osp-cr osp-cr-flash" style="--d:0s;--c:#fff7e8"></i>
  <i class="osp-cr osp-cr-flash" style="--d:.05s;--c:#ffd9a0"></i>
  <i class="osp-cr osp-cr-ray" style="--a:14deg;--c:#ffe0a0;--d:.01s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:79deg;--c:#ff3cc0;--d:.04s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:142deg;--c:#36e0ff;--d:.02s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:206deg;--c:#fff2d6;--d:.05s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:268deg;--c:#ffae4f;--d:.03s"></i>
  <i class="osp-cr osp-cr-ray" style="--a:331deg;--c:#b06aff;--d:.06s"></i>
  <i class="osp-cr osp-cr-ring" style="--c:#fff2d6;--d:0s"></i>
  <i class="osp-cr osp-cr-ring" style="--c:#36e0ff;--d:.07s"></i>
  <i class="osp-cr osp-cr-ring" style="--c:#ff6aa0;--d:.13s"></i>
</div>
<div id="osp-splash" aria-hidden="true"><div class="osp-splash__stage"></div></div>
<script>
  // ===== shared cheap neon-vector helpers (layered strokes, no shadowBlur) =========
  // A small base palette; a single CSS hue-rotate on the canvas recolours the whole
  // composition (Last light + Chromatic), so per-stroke colour stays cheap.
  var OSP_PAL = ['#36e0ff', '#ff3cc0', '#ffd24a', '#b06aff', '#3affd0', '#ff7a4f'];
  function ospClamp(x) { return x < 0 ? 0 : x > 1 ? 1 : x; }
  // Trace a path (fn) as neon: a wide faint pass + a narrow bright pass.
  function ospNeon(g, fn, w, col, a) {
    g.lineCap = 'round'; g.lineJoin = 'round';
    g.strokeStyle = col; g.globalAlpha = a * 0.22; g.lineWidth = w * 2.6; fn(); g.stroke();
    g.globalAlpha = a; g.lineWidth = w; fn(); g.stroke();
  }
  // Slices of light: n wedges of light radiating from the centre, fading outward.
  function ospBeams(g, cx, cy, n, len, rot, halfW, a) {
    if (n <= 0 || len <= 0) return;
    for (var i = 0; i < n; i++) {
      var ang = rot + i * 6.2832 / n, dx = Math.cos(ang), dy = Math.sin(ang), nx = -dy, ny = dx;
      var ex = cx + dx * len, ey = cy + dy * len;
      var grad = g.createLinearGradient(cx, cy, ex, ey), col = OSP_PAL[i % OSP_PAL.length];
      grad.addColorStop(0, col); grad.addColorStop(0.15, col); grad.addColorStop(1, 'rgba(0,0,0,0)');
      g.globalAlpha = a; g.fillStyle = grad;
      g.beginPath(); g.moveTo(cx + nx * halfW, cy + ny * halfW); g.lineTo(cx - nx * halfW, cy - ny * halfW); g.lineTo(ex, ey); g.closePath(); g.fill();
    }
  }
  // The path of one Form. type: 0 ring · 1 polygon · 2 star · 3 slit · 4 lens · 5 lattice · 6 spiral · 7 cross
  function ospFormPath(g, cx, cy, type, R, sides, rot) {
    g.beginPath();
    if (type === 1) { for (var i = 0; i < sides; i++) { var a1 = rot + i * 6.2832 / sides; g[i ? 'lineTo' : 'moveTo'](cx + Math.cos(a1) * R, cy + Math.sin(a1) * R); } g.closePath(); }
    else if (type === 2) { var p = sides * 2; for (var j = 0; j < p; j++) { var a2 = rot + j * 6.2832 / p, rr = j % 2 ? R : R * 0.45; g[j ? 'lineTo' : 'moveTo'](cx + Math.cos(a2) * rr, cy + Math.sin(a2) * rr); } g.closePath(); }
    else if (type === 3) { var hw = R * 0.34, hh = R * 1.2; g.moveTo(cx - hw, cy - hh + hw); g.arc(cx, cy - hh + hw, hw, Math.PI, 0); g.lineTo(cx + hw, cy + hh - hw); g.arc(cx, cy + hh - hw, hw, 0, Math.PI); g.closePath(); } // a vertical portal slit
    else if (type === 4) { g.arc(cx - R * 0.5, cy, R, -0.95, 0.95); g.arc(cx + R * 0.5, cy, R, Math.PI - 0.95, Math.PI + 0.95); } // lens / eye
    else if (type === 6) { var turns = 0.5 + sides * 0.35; for (var s = 0; s <= 120; s++) { var f = s / 120, a3 = rot + f * turns * 6.2832, r3 = R * f; g[s ? 'lineTo' : 'moveTo'](cx + Math.cos(a3) * r3, cy + Math.sin(a3) * r3); } } // spiral
    else if (type === 7) { g.moveTo(cx - R, cy); g.lineTo(cx + R, cy); g.moveTo(cx, cy - R); g.lineTo(cx, cy + R); } // cross
    else { g.arc(cx, cy, R, 0, 6.2832); } // 0 ring (and the outline for 5 lattice)
  }
  // Draw a Form as neon (with an optional halo glow + a grid for the lattice form).
  function ospForm(g, cx, cy, type, R, sides, rot, a, w, halo, turb, t) {
    if (R < 1 || a <= 0.01) return;
    if (turb) { R *= 1 + turb * 0.06 * Math.sin(t * 9); rot += turb * 0.12 * Math.sin(t * 7); }
    if (halo > 0) { var rg = g.createRadialGradient(cx, cy, R * 0.35, cx, cy, R + halo); rg.addColorStop(0, 'rgba(0,0,0,0)'); rg.addColorStop(0.7, OSP_PAL[(type + 1) % OSP_PAL.length]); rg.addColorStop(1, 'rgba(0,0,0,0)'); g.globalAlpha = a * 0.18; g.fillStyle = rg; g.beginPath(); g.arc(cx, cy, R + halo, 0, 6.2832); g.fill(); }
    if (type === 5) { // lattice — a grid clipped to a circle
      g.save(); g.beginPath(); g.arc(cx, cy, R, 0, 6.2832); g.clip();
      var step = 2 * R / Math.max(2, sides), col5 = OSP_PAL[0];
      g.strokeStyle = col5; g.globalAlpha = a; g.lineWidth = w; g.beginPath();
      for (var x = -R; x <= R + 0.5; x += step) { g.moveTo(cx + x, cy - R); g.lineTo(cx + x, cy + R); g.moveTo(cx - R, cy + x); g.lineTo(cx + R, cy + x); }
      g.stroke(); g.restore();
    }
    var col = OSP_PAL[type % OSP_PAL.length];
    ospNeon(g, function () { ospFormPath(g, cx, cy, type, R, sides, rot); }, w, col, a);
  }

  // Push the tunable dials onto CSS custom properties (read by intro.css) for the First's
  // CSS firework. Defaults match the CSS var() fallbacks. The canvas Blast (below) adds the
  // alternate explosion geometries on top.
  function ospSetCreationVars(cr, D) {
    var IG = (D.crIgnition || 0) / 100; // "Ignition" — how violent the birth is
    cr.style.setProperty('--osp-cr-core', (D.crCoreSize != null ? D.crCoreSize : 7) + 'vmax');
    cr.style.setProperty('--osp-cr-flash', (D.crFlashSize != null ? D.crFlashSize : 30) * (1 + IG * 1.2) + 'vmax');
    cr.style.setProperty('--osp-cr-ray-len', (D.crRayLength != null ? D.crRayLength : 150) * (1 + IG * 0.8) + 'vmax');
    cr.style.setProperty('--osp-cr-ring-x', (D.crRingExpand != null ? D.crRingExpand : 13) * (1 + IG * 0.7));
    cr.style.filter = 'hue-rotate(' + (D.crHue || 0) + 'deg) brightness(' + (D.crBright != null ? D.crBright : 1) * (1 + IG * 0.5) + ')';
  }
  function ospSetSplashVars(splash, D) {
    splash.style.filter = 'hue-rotate(' + (D.spHue || 0) + 'deg)';
  }

  // The First's canvas Blast — alternate ways an explosion can happen, drawn over the CSS
  // burst. crBlast: 0 classic (CSS only) · 1 cone · 2 shockwave · 3 shards · 4 lightning · 5 nova.
  window.__ospBlast = function () {
    try {
      var cr = document.getElementById('osp-creation');
      if (!cr) return;
      var D = window.__ospDials || {};
      var mode = Math.round(D.crBlast || 0);
      var rays = cr.getElementsByClassName('osp-cr-ray');
      // Dim the CSS rays when an alternate blast owns the geometry, so they don't clash.
      for (var ri = 0; ri < rays.length; ri++) rays[ri].style.opacity = mode === 0 ? '' : '0.22';
      var old = cr.querySelector('.osp-cr-blastcv');
      if (old) old.remove();
      if (cr.__braf) cancelAnimationFrame(cr.__braf);
      cr.__braf = 0;
      if (mode === 0) return; // classic — pure CSS, nothing to draw
      var cv = document.createElement('canvas');
      cv.className = 'osp-cr-blastcv';
      cv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;z-index:5;pointer-events:none';
      cr.appendChild(cv);
      var g = cv.getContext('2d');
      if (!g) return;
      var sc = Math.min(1, 1400 / Math.max(innerWidth, innerHeight));
      var W = (cv.width = Math.round(innerWidth * sc)), H = (cv.height = Math.round(innerHeight * sc));
      var cx = W / 2, cy = H / 2, vmax = Math.max(W, H) / 100;
      var REACH = (D.crRayLength != null ? D.crRayLength : 150), SPREAD = (D.crSpread != null ? D.crSpread : 100) / 100;
      var SH = Math.round(D.crShards || 0), IGb = 1 + (D.crIgnition || 0) / 100;
      var dir = Math.random() < 0.5 ? 1 : -1, sd = []; // shard seeds
      for (var s = 0; s < SH + 24; s++) sd.push({ a: Math.random() * 6.2832, sp: 0.5 + Math.random(), rot: Math.random() * 6.2832, w: 0.6 + Math.random() * 1.6 });
      var bt0 = 0;
      function bdraw(now) {
        if (!bt0) bt0 = now;
        var t = (now - bt0) / 1000, prog = ospClamp(t / 0.7), ease = prog * (2 - prog);
        g.clearRect(0, 0, W, H);
        g.globalCompositeOperation = 'lighter';
        var len = REACH * vmax * 0.5 * ease * IGb, w = vmax * 1.4;
        if (mode === 1) ospBeams(g, cx, cy, 7, len, -1.5708 - SPREAD * 1.2, w * (0.4 + SPREAD), 0.9 * (1 - prog * 0.4)); // cone (clustered upward)
        else if (mode === 2) { for (var k = 0; k < 4; k++) { var rr = len * (0.4 + k * 0.22) * ease; ospNeon(g, function () { g.beginPath(); g.arc(cx, cy, rr, 0, 6.2832); }, vmax * (1.6 - k * 0.2), OSP_PAL[k % OSP_PAL.length], 0.85 * (1 - prog)); } } // shockwave
        else if (mode === 3) { var n = SH || 16; for (var i = 0; i < n; i++) { var q = sd[i], d = len * q.sp * ease, px = cx + Math.cos(q.a) * d, py = cy + Math.sin(q.a) * d; ospNeon(g, function () { ospFormPath(g, px, py, 1, vmax * 1.8 * q.w, 3, q.rot + t * 6 * dir); }, vmax * 0.9, OSP_PAL[i % OSP_PAL.length], 0.9 * (1 - prog * 0.7)); } } // shards
        else if (mode === 4) { var bolts = 7; for (var b = 0; b < bolts; b++) { var a0 = b * 6.2832 / bolts + 0.2 * Math.sin(t * 20 + b); ospNeon(g, function () { g.beginPath(); g.moveTo(cx, cy); var seg = 6, px2 = cx, py2 = cy; for (var sgi = 1; sgi <= seg; sgi++) { var fr = sgi / seg, jit = (Math.sin(b * 9 + sgi * 3 + ((t * 30) | 0)) ) * vmax * 2 * (1 - fr); var aa = a0 + jit * 0.04; px2 = cx + Math.cos(aa) * len * fr; py2 = cy + Math.sin(aa) * len * fr; g.lineTo(px2, py2); } }, vmax * 0.8, OSP_PAL[b % OSP_PAL.length], 0.9 * (1 - prog * 0.5)); } } // lightning
        else { var rg = g.createRadialGradient(cx, cy, 0, cx, cy, len); rg.addColorStop(0, 'rgba(255,240,210,' + (0.9 * (1 - prog)) + ')'); rg.addColorStop(0.4, OSP_PAL[2]); rg.addColorStop(1, 'rgba(0,0,0,0)'); g.globalAlpha = 1; g.fillStyle = rg; g.beginPath(); g.arc(cx, cy, len, 0, 6.2832); g.fill(); ospBeams(g, cx, cy, 12, len * 1.1, t * dir, w * 0.5, 0.5 * (1 - prog)); } // nova
        g.globalAlpha = 1;
        if (t < 0.95) cr.__braf = requestAnimationFrame(bdraw); else { g.clearRect(0, 0, W, H); cr.__braf = 0; }
      }
      cr.__braf = requestAnimationFrame(bdraw);
    } catch (e) { /* the blast is non-essential */ }
  };

  // Build the Last (and, unless `defer`, play it). The merge drama (orbs, flash, neon
  // streaks, shock rings, plumes) is CSS; the *ending* — slices of light + a selectable
  // neon Form — plus a light dust accent is one cheap canvas. Prebuild during the black
  // hold (defer=true) so it plays instantly with no hitch.
  window.__ospSplash = function (defer) {
    try {
      var splash = document.getElementById('osp-splash');
      var stage = splash && splash.querySelector('.osp-splash__stage');
      if (!stage) return;
      var D = window.__ospDials || {};
      ospSetSplashVars(splash, D);
      splash.classList.remove('osp-splash--hide');
      splash.classList.remove('osp-splash--go');
      splash.__hideAt = 0;
      if (splash.__raf) cancelAnimationFrame(splash.__raf);
      splash.__raf = 0;
      var prev = splash.querySelector('.osp-splash__dustcv');
      if (prev) prev.remove();
      var R = function (a, b) { return a + Math.random() * (b - a); };

      // Structured CSS burst — the merge drama. The resolved geometry lives on the canvas
      // now, so there is no CSS core/disk: the merger can end on any Form.
      var h = '';
      var SC = [['#ff1f9e', '0.22', '7'], ['#ff7a1f', '0.28', '-11'], ['#14e3ff', '0.34', '3'], ['#c23dff', '0.40', '-5']];
      for (var s = 0; s < SC.length; s++) h += '<span class="osp-splash__shock" style="--rc:' + SC[s][0] + ';--sd:' + SC[s][1] + 's;--rr:' + SC[s][2] + 'deg"></span>';
      var KC = ['#ff2fae', '#22e6ff', '#b65cff', '#ffd24a', '#ff5cf0', '#3affd0'], KA = [34, 96, 162, 214, 283, 331];
      for (var kc = 0; kc < KC.length; kc++) h += '<span class="osp-splash__streak" style="--a:' + KA[kc] + 'deg;--kc:' + KC[kc] + '"></span>';
      var PC = ['#ffd24a', '#ffb24a', '#ff8a3c', '#ffe2a0', '#ffc266', '#ff9a48'], PA = [18, 74, 138, 203, 262, 321];
      for (var q = 0; q < PC.length; q++) h += '<span class="osp-splash__plume" style="--a:' + PA[q] + 'deg;--pc:' + PC[q] + '"></span>';
      h += '<span class="osp-splash__orb osp-splash__orb--a"></span><span class="osp-splash__orb osp-splash__orb--b"></span>' +
        '<span class="osp-splash__jet"></span><span class="osp-splash__flash"></span>';
      stage.innerHTML = h;
      stage.style.opacity = '1'; // reset for replay; the draw loop fades it as the Form resolves

      // One cheap canvas: light dust accent + slices of light + the neon Form.
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var cv = document.createElement('canvas');
      cv.className = 'osp-splash__dustcv';
      splash.insertBefore(cv, splash.firstChild);
      var ctx = cv.getContext('2d');
      if (!ctx) return;
      var scl = Math.min(1, 1400 / Math.max(innerWidth, innerHeight));
      var W = (cv.width = Math.round(innerWidth * scl));
      var H = (cv.height = Math.round(innerHeight * scl));
      cv.style.width = innerWidth + 'px';
      cv.style.height = innerHeight + 'px';
      var cx = W / 2, cy = H / 2, vmin = Math.min(W, H) / 100;
      var oc = document.createElement('canvas'); oc.width = W; oc.height = H; var octx = oc.getContext('2d'); // offscreen for Mandala
      function sprite(color) {
        var z = 32, c = document.createElement('canvas'); c.width = c.height = z;
        var gg = c.getContext('2d'), rg = gg.createRadialGradient(z / 2, z / 2, 0, z / 2, z / 2, z / 2);
        rg.addColorStop(0, color); rg.addColorStop(0.4, color); rg.addColorStop(1, 'rgba(0,0,0,0)');
        gg.fillStyle = rg; gg.beginPath(); gg.arc(z / 2, z / 2, z / 2, 0, 6.2832); gg.fill(); return c;
      }
      var warm = ['#fff3df', '#ffe6c2', '#ffd49a', '#ffcf86', '#ffdca8'].map(sprite), cool = ['#eef2ff', '#dbe6ff'].map(sprite);
      var DIR = Math.random() < 0.5 ? 1 : -1;
      var SPARK = Math.max(0, Math.min(100, D.spSparkle != null ? D.spSparkle : 18)) / 100;
      var N = Math.round(SPARK * 170); // hard cap — the dust is an accent, not the show
      if (reduce) N = Math.min(N, 50);
      var COOL = (1 - (D.spWarmth != null ? D.spWarmth : 90) / 100) * 0.5;
      var DAWN = (D.spDawn || 0) / 100;
      var P = new Array(N);
      for (var k = 0; k < N; k++) {
        var isCool = Math.random() < COOL, pal = isCool ? cool : warm;
        P[k] = {
          a: R(0, 6.2832), r0: R(26, 60) + DAWN * R(20, 90), rmin: R(6, 18), rb: R(34, 80),
          tn: DIR * (1.1 + R(-0.2, 0.3)), om: DIR * (0.5 + R(0, 0.8)), mg: (0.2 + R(0, 0.16)) * (1 + DAWN),
          sz: (0.22 + Math.pow(Math.random(), 2) * 0.9) * vmin * (D.spDustSize != null ? D.spDustSize : 1),
          dl: R(0, 0.05) + DAWN * R(0, 0.4), tw: R(0, 6.2832), spr: pal[(Math.random() * pal.length) | 0],
        };
      }

      var t0 = 0, STOP = 2.5;
      function draw(now) {
        if (!t0) {
          t0 = now;
          window.__ospSplashStart = now;
          splash.classList.add('osp-splash--go');
        }
        var t = (now - t0) / 1000;
        var DD = window.__ospDials || {};
        var TRAIL = (DD.spDustTrail || 0) / 100, CYCLE = DD.spColorCycle || 0;
        var TWK = (DD.spTwinkle || 0) / 100, PUL = (DD.spPulse || 0) / 100, TURB = (DD.spTurb || 0) / 100;
        var DUSK = DD.spDriftOut != null ? DD.spDriftOut : 50, FLUX = (DD.spFlux != null ? DD.spFlux : 40) / 100;
        var TEX = (DD.spTexture || 0) / 100; // one knob, chained: smooth → water → flame → crumble → disintegrate
        var TIDE = ospClamp(1 - Math.abs(TEX - 0.25) / 0.25), PYRE = ospClamp(1 - Math.abs(TEX - 0.55) / 0.25);
        var ERO = ospClamp((TEX - 0.55) / 0.3), ENT = ospClamp((TEX - 0.78) / 0.22);
        var NEON = (DD.spNeon != null ? DD.spNeon : 60) / 100;
        var FORM = Math.round(DD.spForm || 0), SIDES = Math.round(DD.spSides != null ? DD.spSides : 6);
        var BEAMS = Math.round(DD.spBeams || 0), SWEEP = (DD.spSweep || 0) / 100;
        var SCALE = DD.spCoreDiameter != null ? DD.spCoreDiameter : 38, HALO = DD.spDiskSize != null ? DD.spDiskSize : 44;
        var MAND = Math.round((DD.spMandala || 0) / 100 * 5), K = MAND >= 1 ? MAND + 1 : 1;
        var g = K > 1 ? octx : ctx; // when mandala-compositing, render the frame offscreen first
        // Last light + Chromatic recolour the whole canvas with one cheap hue-rotate.
        cv.style.filter = 'hue-rotate(' + ((DD.spHue || 0) + t * CYCLE * 0.6) + 'deg)';
        if (TRAIL > 0) { g.globalCompositeOperation = 'source-over'; g.fillStyle = 'rgba(0,0,0,' + (1 - TRAIL * 0.9).toFixed(3) + ')'; g.fillRect(0, 0, W, H); }
        else g.clearRect(0, 0, W, H);
        g.globalCompositeOperation = 'lighter';
        var mp = ospClamp((t - 0.4) / 0.8); mp = mp * mp * (3 - 2 * mp); // merge progress — the Form resolves as the orbs fade
        var late = t > 1.4 ? t - 1.4 : 0; // Dusk shapes the ending, after the Form has formed
        // The CSS merge (orbs, flash, streaks) plays, then the stage fades so the canvas
        // Form behind it becomes the ending — no longer always a bright circle.
        stage.style.opacity = ospClamp(1 - (t - 0.7) / 0.7);
        var puls = 1 + PUL * 0.12 * Math.sin(t * 4);

        // ---- light dust accent ----
        for (var j = 0; j < N; j++) {
          var p = P[j], tt = t - p.dl;
          if (tt < 0) continue;
          var r, grow;
          if (tt < p.mg) { var e = tt / p.mg; r = p.r0 + (p.rmin - p.r0) * e * (2 - e); grow = 1; }
          else { var td = tt - p.mg, kk = td < 0.35 ? td / 0.35 : 1; var eo = kk * kk * (3 - 2 * kk); r = p.rmin + (p.rb - p.rmin) * eo + (td > 0.35 ? (td - 0.35) * 12 * (DUSK / 50) : 0); grow = 1 + eo; }
          if (r < 0) r = 0;
          var al = Math.min(1, tt * 12); if (tt > p.mg + 0.6) al *= Math.max(0, 1 - (tt - p.mg - 0.6));
          if (TWK) al *= 1 + TWK * Math.sin(t * 7 + p.tw);
          if (ENT) al *= 1 - ENT * 0.5 * (0.5 + 0.5 * Math.sin(p.tw * 17 + t * 9));
          if (al <= 0.03) continue;
          var w2 = tt < p.mg ? tt / p.mg : 1; w2 = w2 * (2 - w2);
          var ang = p.a + p.tn * 6.2832 * w2 * (0.4 + FLUX) + p.om * tt;
          if (TURB) { ang += TURB * 0.3 * Math.sin(t * 1.2 + p.a * 4); r += TURB * 3 * Math.sin(t + p.tw); }
          r *= puls;
          var z = p.sz * grow, px = cx + Math.cos(ang) * r * vmin, py = cy + Math.sin(ang) * r * vmin;
          if (TEX > 0) {
            px += Math.sin(t * 1.6 + p.a * 3 + r * 0.18) * TIDE * 2.2 * vmin + ENT * Math.cos(p.tw * 3.1) * (tt > p.mg ? tt - p.mg : 0) * 18 * vmin;
            py += Math.cos(t * 1.3 + r * 0.13) * TIDE * 1.8 * vmin - PYRE * tt * tt * 8 * vmin + ERO * (tt > p.mg ? (tt - p.mg) * (tt - p.mg) : 0) * 14 * vmin + ENT * Math.sin(p.tw * 3.1) * (tt > p.mg ? tt - p.mg : 0) * 18 * vmin;
          }
          g.globalAlpha = Math.min(1.4, al);
          g.drawImage(p.spr, px - z, py - z, z * 2, z * 2);
        }

        // ---- slices of light (beams) ----
        var beamRot = t * (0.25 + SWEEP * 2) * DIR + (1 - mp) * 1.4;
        ospBeams(g, cx, cy, BEAMS, (38 + SCALE * 0.9) * vmin * puls, beamRot, vmin * (0.5 + NEON * 1.6), (0.35 + NEON * 0.5) * mp);

        // ---- the resolved Form ----
        var fr = SCALE * 0.62 * mp * puls;
        fr *= 1 + late * (DUSK / 50) * 0.6; if (fr < 0) fr = 0; // Dusk: collapse(−) / settle(0) / expand(+)
        var fa = (0.6 + NEON * 0.4) * (late > 0.7 ? Math.max(0, 1 - (late - 0.7)) : 1);
        ospForm(g, cx, cy, FORM, fr * vmin, SIDES, t * 0.2 * DIR * (1 + SWEEP), fa, vmin * (0.5 + NEON * 1.8), HALO * vmin * 0.4, TURB, t);

        g.globalAlpha = 1;
        // ---- Mandala: composite the whole frame K times rotated (cheap — K blits) ----
        if (K > 1) {
          ctx.clearRect(0, 0, W, H); ctx.globalCompositeOperation = 'lighter';
          for (var m = 0; m < K; m++) { ctx.save(); ctx.translate(cx, cy); ctx.rotate(m * 6.2832 / K); ctx.translate(-cx, -cy); ctx.drawImage(oc, 0, 0); ctx.restore(); }
        }
        // Keep drawing through the crossfade (the div's opacity fades it out), then stop.
        if (splash.classList.contains('osp-splash--hide') && !splash.__hideAt) splash.__hideAt = t;
        if (t < STOP && !(splash.__hideAt && t > splash.__hideAt + 0.5)) splash.__raf = requestAnimationFrame(draw);
        else { ctx.clearRect(0, 0, W, H); if (octx) octx.clearRect(0, 0, W, H); splash.__raf = 0; splash.__hideAt = 0; }
      }
      splash.__draw = draw;
      if (!defer) window.__ospSplashPlay();
    } catch (e) {
      /* the Last is non-essential — never let it break the page */
    }
  };
  // Play a (possibly prebuilt) Last: schedule its first canvas frame — which adds --go
  // (un-pausing the merger), stamps __ospSplashStart, and animates the canvas.
  window.__ospSplashPlay = function () {
    var splash = document.getElementById('osp-splash');
    if (!splash || !splash.__draw || splash.__raf) return;
    splash.__raf = requestAnimationFrame(splash.__draw);
  };

  // ===== Dials — the one place to tune the intro (40, abstract + macro) ==============
  // Mirrored in src/intro/introTimeline.ts (the inline-sync test guards the two). Times
  // are ms; speeds are duration multipliers (1 = as authored). Several knobs are macros
  // that chain sub-effects internally (Blast, Form, Texture, Flux), so 40 stays expressive.
  window.__ospDials = {
    // First — the birth (scope:first)
    initialBlackMs: 500,
    splitBlackMs: 70,
    creationSpeed: 1,
    crBlast: 0,
    crIgnition: 0,
    crCoreSize: 7,
    crFlashSize: 30,
    crRayLength: 150,
    crSpread: 100,
    crShards: 0,
    crRingExpand: 13,
    crHue: 0,
    crBright: 1,
    // Last — the merger + its resolved Form (scope:last)
    splashSpeed: 1,
    spForm: 0,
    spSides: 6,
    spCoreDiameter: 38,
    spDiskSize: 44,
    spBeams: 0,
    spSweep: 30,
    spNeon: 60,
    spHue: 0,
    spFlux: 40,
    spPulse: 0,
    spColorCycle: 0,
    spSparkle: 18,
    spTexture: 0,
    spDriftOut: 50,
    spMandala: 0,
    // shared character (scope:last)
    spWarmth: 90,
    spTwinkle: 0,
    spDustTrail: 0,
    spTurb: 0,
    spDawn: 0,
    spDustSize: 1,
    // sequencing — how the two halves combine (scope:together)
    creationBeatMs: 240,
    creationToSplashMs: -80,
    creationFadeMs: 120,
    splashHoldMs: 600,
    splashFadeMs: 450,
  };

  // The whole intro, sequenced off the *first painted frame* (so a deferred mobile paint
  // still plays it in full). All timings/speeds come from window.__ospDials.
  window.__ospIntro = function () {
    var D = window.__ospDials;
    try {
      var cr = document.getElementById('osp-creation');
      var splash = document.getElementById('osp-splash');
      var lines = cr && cr.querySelector('.osp-lines');
      // The full Together shows both halves: a prior First-only / Last-only play (or a Swap,
      // which sequences Last→First) may have left a layer display:none — restore both.
      if (cr) cr.style.display = '';
      if (splash) splash.style.display = '';
      if (cr) {
        var ob = cr.querySelector('.osp-cr-blastcv'); if (ob) ob.remove(); // clear any prior blast canvas
        cr.className = 'osp-creation';
        cr.style.setProperty('--osp-cr-scale', D.creationSpeed);
        cr.style.setProperty('--osp-cr-fade', D.creationFadeMs / 1000 + 's');
        ospSetCreationVars(cr, D);
        var crs = cr.getElementsByClassName('osp-cr');
        for (var ci = 0; ci < crs.length; ci++) crs[ci].style.animation = 'none';
        void cr.offsetWidth; // reflow registers the 'none' so the next line restarts from 0
        for (var cj = 0; cj < crs.length; cj++) crs[cj].style.animation = '';
      }
      if (splash) {
        splash.style.setProperty('--osp-splash-scale', D.splashSpeed);
        splash.style.setProperty('--osp-splash-fade', D.splashFadeMs / 1000 + 's');
      }
      if (lines) lines.className = 'osp-lines';
      window.__ospSplashStart = undefined; // a fresh intro: wait for the new Last's first frame
      requestAnimationFrame(function () {
        // Boot the heavy engine bundle at the *start*, so its parse happens under the black hold.
        if (window.__ospBoot && !window.__ospBooted) { window.__ospBooted = true; window.__ospBoot(); }
        // Prebuild the Last during the black hold (idle, hidden) so it plays instantly.
        window.setTimeout(function () { window.__ospSplash(true); }, Math.max(0, D.initialBlackMs - 200));
        window.setTimeout(function () {
          if (lines) lines.classList.add('osp-lines--on');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (lines) lines.classList.remove('osp-lines--on');
              window.setTimeout(function () {
                if (cr) cr.classList.add('osp-creation--go'); // beat C — the First fires
                if (window.__ospBlast) window.__ospBlast(); // ...and its canvas Blast (if any)
                // beat D — play the prebuilt Last near the First's end (overlap dial) and fade in.
                window.setTimeout(window.__ospSplashPlay, Math.max(0, D.creationBeatMs + D.creationToSplashMs));
                window.setTimeout(function () { if (cr) cr.classList.add('osp-creation--hide'); }, D.creationBeatMs);
              }, D.splitBlackMs);
            });
          });
        }, D.initialBlackMs);
      });
      // Safety net: guarantee the engine loads even if the boot above was somehow skipped.
      window.setTimeout(function () {
        if (window.__ospBoot && !window.__ospBooted) { window.__ospBooted = true; window.__ospBoot(); }
      }, 1400);
    } catch (e) {
      window.__ospSplash(); // never let the intro break the page
    }
  };

  // ===== The two halves, playable on their own (selected by window.__ospMode) =========

  // Just the First: black hold → test pattern → CSS burst (+ canvas Blast), Last hidden.
  window.__ospCreation = function () {
    var D = window.__ospDials;
    try {
      var cr = document.getElementById('osp-creation');
      var splash = document.getElementById('osp-splash');
      var lines = cr && cr.querySelector('.osp-lines');
      if (splash) splash.style.display = 'none';
      if (!cr) return;
      var ob = cr.querySelector('.osp-cr-blastcv'); if (ob) ob.remove();
      cr.style.display = '';
      cr.className = 'osp-creation';
      cr.style.setProperty('--osp-cr-scale', D.creationSpeed);
      ospSetCreationVars(cr, D);
      var crs = cr.getElementsByClassName('osp-cr');
      for (var ci = 0; ci < crs.length; ci++) crs[ci].style.animation = 'none';
      void cr.offsetWidth; // reflow so the burst restarts on replay (see __ospIntro)
      for (var cj = 0; cj < crs.length; cj++) crs[cj].style.animation = '';
      if (lines) lines.className = 'osp-lines';
      requestAnimationFrame(function () {
        window.setTimeout(function () {
          if (lines) lines.classList.add('osp-lines--on');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (lines) lines.classList.remove('osp-lines--on');
              window.setTimeout(function () { cr.classList.add('osp-creation--go'); if (window.__ospBlast) window.__ospBlast(); }, D.splitBlackMs);
            });
          });
        }, D.initialBlackMs);
      });
    } catch (e) {
      /* the First is non-essential — never let it break the page */
    }
  };

  // Just the Last: First hidden, build + play the merger and its Form.
  window.__ospSplashOnly = function () {
    var D = window.__ospDials;
    try {
      var cr = document.getElementById('osp-creation');
      var splash = document.getElementById('osp-splash');
      if (cr) cr.style.display = 'none';
      if (splash) {
        splash.style.display = '';
        splash.style.setProperty('--osp-splash-scale', D.splashSpeed);
      }
      window.__ospSplash(); // build + play
    } catch (e) {
      window.__ospSplash();
    }
  };

  // The generic engine entry: play the whole Together, or one half, per window.__ospMode
  // (set by the registry/lab/showcase/export). Default 'together' is the full sequence.
  // Accepts the current vocabulary (first / last / together), the previous one
  // (burst / merger / moment) and the oldest internal names (creation / splash / full).
  window.__ospPlay = function () {
    var mode = window.__ospMode || 'together';
    if (mode === 'first' || mode === 'burst' || mode === 'creation') return window.__ospCreation();
    if (mode === 'last' || mode === 'merger' || mode === 'splash') return window.__ospSplashOnly();
    return window.__ospIntro();
  };
  window.__ospPlay();
</script>

    <script>
      (function () {
      window.__ospLoop = window.setInterval(function () { if (window.__ospPlay) window.__ospPlay(); }, 1970);
      })();
    </script>
  </body>
</html>
